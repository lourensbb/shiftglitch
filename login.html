<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftGlitch — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sg-green: #39FF14;
      --sg-magenta: #FF00FF;
      --sg-purple: #8A2BE2;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #d1fae5;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .orb-green  { width: 600px; height: 600px; background: var(--sg-green);   top: -200px; left: -200px; animation: drift1 20s ease-in-out infinite; }
    .orb-magenta{ width: 500px; height: 500px; background: var(--sg-magenta); bottom: -200px; right: -150px; animation: drift2 25s ease-in-out infinite; }
    .orb-purple { width: 400px; height: 400px; background: var(--sg-purple);  top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 18s ease-in-out infinite; }

    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,60px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-40px)} }
    @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-48%,-53%)} }

    /* Scanlines */
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
    }

    /* Main layout */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Wordmark */
    .wordmark {
      font-family: 'VT323', monospace;
      font-size: clamp(3.5rem, 12vw, 7rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sg-green);
      text-shadow: 0 0 20px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.2);
      position: relative;
      line-height: 1;
      cursor: default;
      user-select: none;
      animation: glitch 6s infinite;
    }
    .wordmark::before, .wordmark::after {
      content: 'SHIFTGLITCH';
      position: absolute; left: 0; top: 0; width: 100%;
    }
    .wordmark::before {
      color: var(--sg-magenta);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch-before 6s infinite;
    }
    .wordmark::after {
      color: #00ffff;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitch-after 6s infinite;
    }
    @keyframes glitch {
      0%,89%,100%{ text-shadow: 0 0 20px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.2); }
      90%{ text-shadow: 4px 0 var(--sg-magenta), -4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
      92%{ text-shadow: -4px 0 var(--sg-magenta), 4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
      94%{ text-shadow: 4px 0 var(--sg-magenta), -4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
    }
    @keyframes glitch-before {
      0%,89%,100%{ opacity:0; transform: translate(0); }
      90%{ opacity:0.8; transform: translate(-4px, 2px); }
      92%{ opacity:0.6; transform: translate(4px, -2px); }
      94%{ opacity:0; }
    }
    @keyframes glitch-after {
      0%,89%,100%{ opacity:0; transform: translate(0); }
      90%{ opacity:0.7; transform: translate(4px, -2px); }
      92%{ opacity:0.5; transform: translate(-4px, 2px); }
      94%{ opacity:0; }
    }

    /* Card */
    .login-card {
      margin-top: 2.5rem;
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 4px;
      padding: 2.5rem 3rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(57,255,20,0.07), inset 0 0 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }

    .slogan {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.95rem, 3vw, 1.1rem);
      color: var(--sg-green);
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    .sub-text {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 2rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.03em;
    }

    .login-btn {
      display: inline-block;
      width: 100%;
      padding: 0.85rem 2rem;
      background: transparent;
      color: var(--sg-green);
      border: 2px solid var(--sg-green);
      border-radius: 2px;
      font-family: 'VT323', monospace;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 12px rgba(57,255,20,0.2);
    }
    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sg-green);
      transform: translateX(-101%);
      transition: transform 0.25s ease;
      z-index: -1;
    }
    .login-btn:hover::before { transform: translateX(0); }
    .login-btn:hover {
      color: #000;
      box-shadow: 0 0 30px rgba(57,255,20,0.5);
    }

    .hint {
      margin-top: 1.2rem;
      font-size: 0.75rem;
      color: #333;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.03em;
    }
    .hint span { color: #444; }

    /* Corner tag */
    .corner-tag {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: #222;
      letter-spacing: 0.05em;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="orb orb-green"></div>
  <div class="orb orb-magenta"></div>
  <div class="orb orb-purple"></div>
  <div class="scanlines"></div>

  <main class="page">
    <div class="wordmark">SHIFTGLITCH</div>

    <div class="login-card">
      <p class="slogan">GRADES AND AURA FALL UP.</p>
      <p class="sub-text">// authenticate to access the OS</p>

      <a href="/api/login" class="login-btn">JACK IN &gt;&gt;</a>

      <p class="hint">
        <span>Google · GitHub · Apple · X · Email</span>
      </p>
    </div>
  </main>

  <div class="corner-tag">SHIFTGLITCH_OS v2.0 // SECURE_BOOT</div>
</body>
</html>
