  <title>ShiftGlitch — Jack In</title>
  <meta name="description" content="Log in to ShiftGlitch — the cyberpunk cognitive adventure platform.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://shiftglitch.replit.app/login">
  <meta property="og:title" content="ShiftGlitch — Jack In">
  <meta property="og:description" content="Jack in to ShiftGlitch. The cyberpunk cognitive adventure platform — free to start.">
  <meta property="og:site_name" content="ShiftGlitch">
  <meta property="og:image" content="https://shiftglitch.replit.app/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="ShiftGlitch — Jack In">
  <meta name="twitter:description" content="Jack in to ShiftGlitch. The cyberpunk cognitive adventure platform — free to start.">
  <meta name="twitter:image" content="https://shiftglitch.replit.app/og-image.png">
  <link rel="canonical" href="https://shiftglitch.replit.app/login">
  <link rel="icon" href="/assets/shiftglitch-logo-only.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --sg-green: #39FF14;
      --sg-magenta: #FF00FF;
      --sg-purple: #8A2BE2;
    }

    html, body {
      min-height: 100%;
      background: #000;
      color: #d1fae5;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .orb-green  { width: 600px; height: 600px; background: var(--sg-green);   top: -200px; left: -200px; animation: drift1 20s ease-in-out infinite; }
    .orb-magenta{ width: 500px; height: 500px; background: var(--sg-magenta); bottom: -200px; right: -150px; animation: drift2 25s ease-in-out infinite; }
    .orb-purple { width: 400px; height: 400px; background: var(--sg-purple);  top: 50%; left: 50%; transform: translate(-50%,-50%); animation: drift3 18s ease-in-out infinite; }

    @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,60px)} }
    @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-40px)} }
    @keyframes drift3 { 0%,100%{transform:translate(-50%,-50%)} 50%{transform:translate(-48%,-53%)} }

    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px);
    }

    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .logo-icon {
      width: clamp(48px, 10vw, 72px);
      height: auto;
      margin-bottom: 0.5rem;
      opacity: 0.9;
      filter: drop-shadow(0 0 10px rgba(57,255,20,0.4));
    }

    .wordmark {
      font-family: 'VT323', monospace;
      font-size: clamp(3.5rem, 12vw, 7rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--sg-green);
      text-shadow: 0 0 20px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.2);
      position: relative;
      line-height: 1;
      cursor: default;
      user-select: none;
      animation: glitch 6s infinite;
    }
    .wordmark::before, .wordmark::after {
      content: 'SHIFTGLITCH';
      position: absolute; left: 0; top: 0; width: 100%;
    }
    .wordmark::before {
      color: var(--sg-magenta);
      clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%);
      animation: glitch-before 6s infinite;
    }
    .wordmark::after {
      color: #00ffff;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
      animation: glitch-after 6s infinite;
    }
    @keyframes glitch {
      0%,89%,100%{ text-shadow: 0 0 20px rgba(57,255,20,0.5), 0 0 60px rgba(57,255,20,0.2); }
      90%{ text-shadow: 4px 0 var(--sg-magenta), -4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
      92%{ text-shadow: -4px 0 var(--sg-magenta), 4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
      94%{ text-shadow: 4px 0 var(--sg-magenta), -4px 0 #00ffff, 0 0 20px rgba(57,255,20,0.5); }
    }
    @keyframes glitch-before {
      0%,89%,100%{ opacity:0; transform: translate(0); }
      90%{ opacity:0.8; transform: translate(-4px, 2px); }
      92%{ opacity:0.6; transform: translate(4px, -2px); }
      94%{ opacity:0; }
    }
    @keyframes glitch-after {
      0%,89%,100%{ opacity:0; transform: translate(0); }
      90%{ opacity:0.7; transform: translate(4px, -2px); }
      92%{ opacity:0.5; transform: translate(-4px, 2px); }
      94%{ opacity:0; }
    }

    .login-card {
      margin-top: 2.5rem;
      background: rgba(10,10,10,0.92);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 4px;
      padding: 2.5rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 40px rgba(57,255,20,0.07), inset 0 0 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }

    .slogan {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.95rem, 3vw, 1.05rem);
      color: var(--sg-green);
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .sub-text {
      font-size: 0.82rem;
      color: #666;
      margin-bottom: 2rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.03em;
    }

    /* Error banner */
    .error-banner {
      display: none;
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,80,80,0.4);
      border-radius: 2px;
      padding: 0.6rem 1rem;
      margin-bottom: 1.2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #ff8080;
      text-align: left;
    }
    .error-banner.show { display: block; }

    /* Auth buttons */
    .auth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.8rem 1.5rem;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      position: relative;
      overflow: hidden;
    }

    .btn-replit {
      background: transparent;
      color: var(--sg-green);
      border: 2px solid var(--sg-green);
      box-shadow: 0 0 12px rgba(57,255,20,0.15);
      font-family: 'VT323', monospace;
      font-size: 1.55rem;
      letter-spacing: 0.15em;
    }
    .btn-replit::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--sg-green);
      transform: translateX(-101%);
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn-replit:hover::before { transform: translateX(0); }
    .btn-replit:hover { color: #000; box-shadow: 0 0 30px rgba(57,255,20,0.4); }
    .btn-replit span { position: relative; z-index: 1; }

    .btn-google {
      background: #fff;
      color: #333;
      border: 2px solid transparent;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
    }
    .btn-google:hover { background: #f1f1f1; box-shadow: 0 2px 12px rgba(255,255,255,0.15); }
    .btn-google svg { flex-shrink: 0; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.2rem 0;
      color: #444;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(57,255,20,0.12);
    }

    /* Email form */
    .email-form { margin-top: 0; }
    .email-input-wrap { display: flex; gap: 0.5rem; }
    .email-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(57,255,20,0.2);
      border-radius: 2px;
      color: #e0e0e0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      padding: 0.75rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: #444; }
    .email-input:focus { border-color: rgba(57,255,20,0.5); }

    .btn-send {
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.35);
      color: var(--sg-green);
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-send:hover { background: rgba(57,255,20,0.22); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .email-status {
      margin-top: 0.75rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      min-height: 1.2em;
      text-align: left;
    }
    .email-status.ok  { color: var(--sg-green); }
    .email-status.err { color: #ff8080; }

    .corner-tag {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #444;
      letter-spacing: 0.05em;
      z-index: 10;
    }

    @media (max-width: 400px) {
      .login-card { padding: 2rem 1.25rem; }
      .corner-tag { display: none; }
      .email-input-wrap { flex-direction: column; }
      .btn-send { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="orb orb-green"></div>
  <div class="orb orb-magenta"></div>
  <div class="orb orb-purple"></div>
  <div class="scanlines"></div>

  <main class="page">
    <img src="/assets/shiftglitch-logo-only.png" alt="ShiftGlitch" class="logo-icon">
    <div class="wordmark">SHIFTGLITCH</div>

    <div class="login-card">
      <p class="slogan">GRADES AND AURA FALL UP.</p>
      <p class="sub-text">// choose your access protocol</p>

      <div class="error-banner" id="errBanner"></div>

      <!-- Replit / multi-provider -->
      <a href="/api/login" class="auth-btn btn-replit">
        <span>JACK IN WITH REPLIT &nbsp;&rsaquo;&rsaquo;</span>
      </a>

      <div class="divider">or</div>

      <!-- Email magic link -->
      <div class="email-form">
        <div class="email-input-wrap">
          <input
            type="email"
            id="emailInput"
            class="email-input"
            placeholder="operative@domain.com"
            autocomplete="email"
            inputmode="email"
          >
          <button class="btn-send" id="sendBtn" onclick="sendMagicLink()">SEND LINK</button>
        </div>
        <div class="email-status" id="emailStatus"></div>
      </div>
    </div>
  </main>

  <div class="corner-tag">SHIFTGLITCH_OS v2.0 // SECURE_BOOT</div>

  <script>
    // Show error from URL param
    const params = new URLSearchParams(location.search);
    const errMap = {
      google_not_configured: '// Google login is not yet configured.',
      google_failed: '// Google authentication failed. Try again or use email.',
      token_expired: '// Login link has expired (15 min limit). Request a new one below.',
      invalid_token: '// Invalid login link. Request a new one below.',
      verify_failed: '// Verification failed. Try again.'
    };
    const errCode = params.get('error');
    if (errCode && errMap[errCode]) {
      const banner = document.getElementById('errBanner');
      banner.textContent = errMap[errCode];
      banner.classList.add('show');
    }

    async function sendMagicLink() {
      const input = document.getElementById('emailInput');
      const btn = document.getElementById('sendBtn');
      const status = document.getElementById('emailStatus');
      const email = input.value.trim();

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        status.className = 'email-status err';
        status.textContent = '// Enter a valid email address.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'SENDING...';
      status.className = 'email-status';
      status.textContent = '';

      try {
        const res = await fetch('/auth/email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.ok) {
          status.className = 'email-status ok';
          status.textContent = '// Link sent — check your inbox (and spam folder).';
          btn.textContent = 'SENT ✓';
          input.disabled = true;
        } else {
          throw new Error(data.error || 'Send failed');
        }
      } catch (err) {
        status.className = 'email-status err';
        status.textContent = '// Failed to send. Try again.';
        btn.disabled = false;
        btn.textContent = 'SEND LINK';
      }
    }

    document.getElementById('emailInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMagicLink();
    });
  </script>
</body>
</html>
