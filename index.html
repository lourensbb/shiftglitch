<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse - Interactive Learning OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script type="module">
        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const firebaseConfig = JSON.parse(__firebase_config);
            const app_fb = initializeApp(firebaseConfig);
            window.fb = {
                auth: getAuth(app_fb), db: getFirestore(app_fb),
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',
                doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc,
                signInAnonymously, signInWithCustomToken, onAuthStateChanged
            };
        } catch(e) {
            console.warn("Firebase not configured, running in local-only mode.", e.message);
            window.fb = null;
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Lora', 'serif'] },
                    colors: { stone: { 850: '#1f1c1a' } }
                }
            }
        }
    </script>

    <style>
        :root { --bg-color: #FDFCF8; --text-color: #2D2A26; }
        .dark { background-color: #1c1917; color: #e7e5e4; --bg-color: #1c1917; --text-color: #e7e5e4; }
        .dark .bg-white { background-color: #292524 !important; }
        .dark .text-stone-900 { color: #f5f5f4 !important; }
        .dark h1, .dark h2, .dark h3, .dark h4 { color: #f5f5f4 !important; }
        .dark .bg-stone-50 { background-color: #1c1917 !important; }
        .dark .border-stone-100, .dark .border-stone-200, .dark .border-stone-800 { border-color: #44403c !important; }
        .dark .text-stone-500, .dark .text-stone-600 { color: #a8a29e !important; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s ease, color 0.3s ease; line-height: 1.6; }
        h1, h2, h3, h4 { font-family: 'Lora', serif; letter-spacing: -0.02em; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flipped { transform: rotateY(180deg); }
        .cornell-notes { min-height: 400px; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 24px 24px; padding: 2.5rem; line-height: 2; outline: none; border-radius: 1.5rem; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.05); font-family: 'Inter', sans-serif; font-size: 1.1rem; }
        .dark .cornell-notes { background-image: radial-gradient(#3f3a36 1px, transparent 1px); background-color: #292524; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; height: 300px; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ai-loader { border: 2px solid #f3f3f3; border-top: 2px solid #ea580c; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="checkbox"] { accent-color: #ea580c; width: 1.1rem; height: 1.1rem; cursor: pointer; }
        .timer-circle { transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body class="antialiased selection:bg-orange-100 dark:selection:bg-orange-900 selection:text-orange-900 dark:selection:text-orange-100 font-sans">

    <nav class="sticky top-0 z-50 bg-[#FDFCF8]/90 dark:bg-[#1c1917]/90 backdrop-blur-md border-b border-stone-200 dark:border-stone-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="app.navTo('dashboard')">
                        <div class="w-8 h-8 bg-stone-800 dark:bg-orange-600 rounded-full flex items-center justify-center text-[#FDFCF8] font-serif font-bold text-lg">S</div>
                        <span class="font-serif text-xl font-bold tracking-tight text-stone-900 dark:text-stone-50">Synapse</span>
                    </div>
                    <button id="theme-toggle" class="text-2xl hover:scale-110 transition-transform focus:outline-none">&#x1F319;</button>
                </div>
                <div class="hidden md:flex items-center gap-6" id="desktop-nav">
                    <button onclick="app.navTo('dashboard')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Mission</button>
                    <button onclick="app.navTo('explore')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Vault</button>
                    <button onclick="app.navTo('spaced')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Spaced</button>
                    <button onclick="app.navTo('decks')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Decks</button>
                    <button onclick="app.navTo('blurt')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Blurt</button>
                    <button onclick="app.navTo('stats')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">Stats</button>
                    <button onclick="app.showAbout()" class="text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-sm font-semibold tracking-wide transition-colors uppercase">About</button>
                </div>
                <div class="md:hidden flex items-center">
                    <button onclick="app.toggleMobileMenu()" class="text-stone-600 dark:text-stone-400 p-2 text-2xl"><span id="menu-icon">&#x2630;</span></button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-[#FDFCF8] dark:bg-[#1c1917] border-b border-stone-200 dark:border-stone-800 px-4 pt-2 pb-6 space-y-1">
            <button onclick="app.navTo('dashboard')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Mission</button>
            <button onclick="app.navTo('explore')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Vault</button>
            <button onclick="app.navTo('spaced')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Spaced</button>
            <button onclick="app.navTo('decks')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Decks</button>
            <button onclick="app.navTo('blurt')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Blurt</button>
            <button onclick="app.navTo('stats')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Stats</button>
        </div>
    </nav>

    <main id="app-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 pb-24"></main>

    <div id="modal-overlay" class="fixed inset-0 bg-stone-900/80 backdrop-blur-md hidden z-[60] opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-[#1c1917] w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-[2.5rem] shadow-2xl transform scale-95 transition-transform duration-300 border border-stone-200 dark:border-stone-800"></div>
    </div>

    <div id="notification-box" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-stone-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] hidden flex items-center gap-4">
        <span id="notification-msg" class="font-medium">Session Complete!</span>
        <button onclick="app.hideNotification()" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-lg text-xs font-bold uppercase">Close</button>
    </div>

    <script>
        function esc(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str || ''));
            return d.innerHTML;
        }

        const AI_MODEL = "gemini-2.0-flash";

        const aiService = {
            async callGemini(userQuery, systemPrompt = "") {
                const payload = { model: AI_MODEL, contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
                try {
                    const response = await fetch('/api/gemini', { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        return err.error || "API error occurred.";
                    }
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    return "Failed to contact the AI Mission Core.";
                }
            }
        };

        const learningData = [
            { id: 1, title: "Active Recall", category: "Memorization", efficiency: 95, effort: 85, summary: "Testing before review.", description: "The practice of retrieving information from memory without cues.", example: "Close the book and draw the system from memory.", steps: ["Scan material", "Hide source", "Recall and record"] },
            { id: 2, title: "Spaced Repetition", category: "Retention", efficiency: 92, effort: 40, summary: "Interval optimization.", description: "Reviewing information at increasing intervals to exploit the spacing effect.", example: "Review after 1 day, then 3 days, then 1 week.", steps: ["1 Day Review", "3 Day Review", "1 Week Review"] },
            { id: 3, title: "Feynman Technique", category: "Understanding", efficiency: 88, effort: 90, summary: "Simplify to teach.", description: "Teaching a concept in simple terms to identify gaps.", example: "Explain 'Quantum Entanglement' to a 10-year-old.", steps: ["Pick topic", "Teach child", "Spot logic gaps"] },
            { id: 4, title: "Interleaving", category: "Application", efficiency: 85, effort: 75, summary: "Subject shuffling.", description: "Mixing different subjects or problem types in a single session.", example: "Alternate between tennis serves and volleys.", steps: ["Pick 3 topics", "Rotate 25 mins", "Compare logic"] },
            { id: 5, title: "The Leitner System", category: "Retention", efficiency: 94, effort: 65, summary: "Box-based flashcards.", description: "A structured method using flashcards where correct cards move to less-frequent boxes, incorrect cards return to Box 1.", example: "Box 1: Daily. Box 2: Every 3 days. Box 3: Weekly.", steps: ["Setup 5 Boxes", "Test Box 1", "Correct? Advance", "Wrong? Reset to 1"] }
        ];

        const deckStore = {
            load() { try { state.fcDecks = JSON.parse(localStorage.getItem('synapse_decks') || '[]'); } catch(e) { state.fcDecks = []; } },
            save() { localStorage.setItem('synapse_decks', JSON.stringify(state.fcDecks)); },
            add(title) { const d = { id: Date.now().toString(), title, createdAt: Date.now() }; state.fcDecks.push(d); this.save(); return d; },
            remove(id) { state.fcDecks = state.fcDecks.filter(d => d.id !== id); cardStore.removeByDeck(id); this.save(); },
        };

        const cardStore = {
            load() { try { state.fcCards = JSON.parse(localStorage.getItem('synapse_cards') || '[]'); } catch(e) { state.fcCards = []; } },
            save() { localStorage.setItem('synapse_cards', JSON.stringify(state.fcCards)); },
            add(deckId, front, back) {
                const c = { id: Date.now().toString(), deckId, front, back, box: 1, nextReview: Date.now(), createdAt: Date.now() };
                state.fcCards.push(c); this.save(); return c;
            },
            remove(id) { state.fcCards = state.fcCards.filter(c => c.id !== id); this.save(); },
            removeByDeck(deckId) { state.fcCards = state.fcCards.filter(c => c.deckId !== deckId); this.save(); },
            getForDeck(deckId) { return state.fcCards.filter(c => c.deckId === deckId); },
            getDue(deckId) { const now = Date.now(); return this.getForDeck(deckId).filter(c => c.nextReview <= now); },
            promote(card) {
                const intervals = [0, 1, 3, 7, 14, 30];
                card.box = Math.min(card.box + 1, 5);
                card.nextReview = Date.now() + intervals[card.box] * 86400000;
                this.save();
            },
            demote(card) { card.box = 1; card.nextReview = Date.now(); this.save(); }
        };

        const pomodoroStore = {
            load() { try { state.pomodoroLog = JSON.parse(localStorage.getItem('synapse_pomodoro_log') || '[]'); } catch(e) { state.pomodoroLog = []; } },
            save() { localStorage.setItem('synapse_pomodoro_log', JSON.stringify(state.pomodoroLog)); },
            normalize(label) { return label.trim().replace(/\s+/g, ' ').toLowerCase(); },
            log(taskLabel) { state.pomodoroLog.push({ task: this.normalize(taskLabel), completedAt: Date.now(), duration: state.timerInitialSeconds }); this.save(); },
            consecutiveCount(taskLabel) {
                const key = this.normalize(taskLabel);
                if (!key) return 0;
                let count = 0;
                for (let i = state.pomodoroLog.length - 1; i >= 0; i--) {
                    if (state.pomodoroLog[i].task === key) count++;
                    else break;
                }
                return count;
            },
            clearStreak() { state.pomodoroLog.push({ task: '__breakdown__', completedAt: Date.now() }); this.save(); },
            totalFocusTime() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.duration).reduce((s, p) => s + p.duration, 0); },
            totalSessions() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__').length; },
            recentDays(n) {
                const now = Date.now();
                const days = [];
                for (let i = n - 1; i >= 0; i--) {
                    const dayStart = new Date(now - i * 86400000); dayStart.setHours(0,0,0,0);
                    const dayEnd = new Date(dayStart); dayEnd.setHours(23,59,59,999);
                    const count = state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.completedAt >= dayStart.getTime() && p.completedAt <= dayEnd.getTime()).length;
                    days.push({ label: dayStart.toLocaleDateString('en', { weekday: 'short' }), count });
                }
                return days;
            }
        };

        const blurtStore = {
            load() { try { state.blurtSessions = JSON.parse(localStorage.getItem('synapse_blurt') || '[]'); } catch(e) { state.blurtSessions = []; } },
            save() { localStorage.setItem('synapse_blurt', JSON.stringify(state.blurtSessions)); },
            add(title, source) { const s = { id: Date.now().toString(), title, source, recall: '', gaps: '', reviewCount: 0, createdAt: Date.now(), updatedAt: Date.now() }; state.blurtSessions.push(s); this.save(); return s; },
            update(id, data) { const s = state.blurtSessions.find(x => x.id === id); if (s) { Object.assign(s, data, { updatedAt: Date.now() }); this.save(); } },
            remove(id) { state.blurtSessions = state.blurtSessions.filter(s => s.id !== id); this.save(); },
            get(id) { return state.blurtSessions.find(s => s.id === id); }
        };

        const state = {
            view: 'dashboard', search: '', aiOutput: '', isAiLoading: false, user: null, breakdown: '', progress: {},
            timerSeconds: 25 * 60, timerInitialSeconds: 25 * 60, timerIsRunning: false, timerMode: 'work', timerInterval: null,
            timerTaskLabel: '', governorBlocked: false, pomodoroLog: [],
            fcDecks: [], fcCards: [], fcCurrentDeck: null, fcStudyQueue: [], fcStudyIndex: 0, fcFlipped: false,
            blurtSessions: [], blurtCurrentId: null, blurtPhase: 'list',
        };

        const app = {
            charts: { scatter: null, doughnut: null },

            init: async () => {
                const toggle = document.getElementById('theme-toggle');
                toggle.addEventListener('click', () => {
                    document.body.classList.toggle('dark');
                    toggle.textContent = document.body.classList.contains('dark') ? '\u2600\uFE0F' : '\uD83C\uDF19';
                    if (state.view === 'dashboard') app.renderCharts();
                });

                deckStore.load(); cardStore.load(); pomodoroStore.load(); blurtStore.load();

                if (window.fb && window.fb.auth) {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.fb.signInWithCustomToken(window.fb.auth, __initial_auth_token);
                        } else { await window.fb.signInAnonymously(window.fb.auth); }
                    } catch (err) { console.error("Auth Error", err); }
                    window.fb.onAuthStateChanged(window.fb.auth, async (user) => {
                        state.user = user;
                        if (user) await app.loadUserData();
                    });
                }

                app.navTo('dashboard');
                window.addEventListener('resize', app.handleResize);
            },

            handleResize: () => { if (state.view === 'dashboard') app.renderCharts(); },
            toggleMobileMenu: () => { const m = document.getElementById('mobile-menu'); if (m) m.classList.toggle('hidden'); },

            navTo: (tabId) => {
                state.view = tabId;
                window.scrollTo(0, 0);
                const menu = document.getElementById('mobile-menu');
                if (menu) menu.classList.add('hidden');
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-orange-600', 'font-bold');
                    const map = { dashboard: 'Mission', explore: 'Vault', spaced: 'Spaced', decks: 'Decks', blurt: 'Blurt', stats: 'Stats' };
                    if (btn.textContent.trim().toUpperCase() === (map[tabId] || '').toUpperCase()) btn.classList.add('text-orange-600', 'font-bold');
                });
                app.render();
            },

            startTimer: () => {
                if (state.timerIsRunning) return;
                if (state.timerMode === 'work') {
                    const labelEl = document.getElementById('timer-task-label');
                    if (labelEl) state.timerTaskLabel = labelEl.value;
                    if (!state.timerTaskLabel.trim()) { app.showNotification('Enter what you are working on first.'); return; }
                    const streak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                    if (streak >= 4) { state.governorBlocked = true; app.render(); return; }
                }
                state.timerIsRunning = true;
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    app.updateTimerUI();
                    if (state.timerSeconds <= 0) {
                        app.pauseTimer();
                        if (state.timerMode === 'work' && state.timerTaskLabel) {
                            pomodoroStore.log(state.timerTaskLabel);
                            const newStreak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                            app.showNotification(`Focus complete! Streak: ${newStreak}/4`);
                            if (newStreak >= 4) { state.governorBlocked = true; }
                        } else {
                            app.showNotification("Break over!");
                        }
                        app.render();
                    }
                }, 1000);
                app.updateTimerUI();
            },

            pauseTimer: () => { state.timerIsRunning = false; clearInterval(state.timerInterval); app.updateTimerUI(); },

            resetTimer: () => { app.pauseTimer(); state.timerSeconds = state.timerInitialSeconds; state.governorBlocked = false; app.render(); },

            switchTimerMode: (mode) => {
                app.pauseTimer();
                state.timerMode = mode;
                state.timerInitialSeconds = mode === 'work' ? 25 * 60 : 5 * 60;
                state.timerSeconds = state.timerInitialSeconds;
                state.governorBlocked = false;
                app.render();
            },

            updateTimerUI: () => {
                const display = document.getElementById('timer-display');
                const btn = document.getElementById('timer-toggle-btn');
                const progress = document.getElementById('timer-progress');
                if (!display || !btn || !progress) return;
                const m = Math.floor(state.timerSeconds / 60);
                const s = state.timerSeconds % 60;
                display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                btn.textContent = state.timerIsRunning ? 'Pause' : 'Start';
                const circumference = 2 * Math.PI * 45;
                const offset = circumference - (state.timerSeconds / state.timerInitialSeconds) * circumference;
                progress.style.strokeDasharray = `${circumference} ${circumference}`;
                progress.style.strokeDashoffset = offset;
            },

            showNotification: (msg) => {
                const box = document.getElementById('notification-box');
                const text = document.getElementById('notification-msg');
                if (text) text.textContent = msg;
                if (box) { box.classList.remove('hidden'); setTimeout(() => box.classList.add('hidden'), 4000); }
            },
            hideNotification: () => { const box = document.getElementById('notification-box'); if (box) box.classList.add('hidden'); },

            async saveUserData() {
                const notesArea = document.getElementById('notes-editable');
                if (notesArea) localStorage.setItem('cornellNotes', notesArea.innerHTML);
                if (!state.user || !window.fb) return;
                const progressItems = document.querySelectorAll('#progress-list input[type="checkbox"]');
                const progressState = {};
                progressItems.forEach(item => { progressState[item.id] = item.checked; });
                const statusIndicator = document.getElementById('save-status');
                if (statusIndicator) statusIndicator.textContent = "Saving...";
                try {
                    const dataRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', state.user.uid, 'settings', 'user_data');
                    await window.fb.setDoc(dataRef, { notes: notesArea ? notesArea.innerHTML : "", progress: progressState, updatedAt: Date.now() });
                    if (statusIndicator) statusIndicator.textContent = "Synced";
                    state.progress = progressState;
                } catch (e) { if (statusIndicator) statusIndicator.textContent = "Sync Error"; }
            },

            async loadUserData() {
                const localNotes = localStorage.getItem('cornellNotes');
                const notesArea = document.getElementById('notes-editable');
                if (notesArea && localNotes) notesArea.innerHTML = localNotes;
                if (!state.user || !window.fb) return;
                try {
                    const dataRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', state.user.uid, 'settings', 'user_data');
                    const snap = await window.fb.getDoc(dataRef);
                    if (snap.exists()) {
                        const data = snap.data();
                        if (notesArea && data.notes) notesArea.innerHTML = data.notes;
                        if (data.progress) {
                            state.progress = data.progress;
                            Object.keys(data.progress).forEach(id => { const el = document.getElementById(id); if (el) el.checked = data.progress[id]; });
                        }
                    }
                } catch (e) { console.error("Load failed", e); }
            },

            async generateMissionPlan() {
                const subject = document.getElementById('subjectInput').value;
                if (!subject) return;
                state.isAiLoading = true; app.render();
                const res = await aiService.callGemini(
                    `Draft a 3-stage mission plan for learning "${esc(subject)}" using these techniques: ${learningData.map(t => t.title).join(', ')}.`,
                    "You are an expert learning coach. Give a clear, actionable study plan in 3 stages. Be concise but thorough."
                );
                state.aiOutput = res; state.isAiLoading = false; app.render();
            },

            openModal: (id) => {
                const t = learningData.find(x => x.id === id);
                if (!t) return;
                document.getElementById('modal-content').innerHTML = `
                    <div class="p-8 relative">

                const f = document.getElementById('card-front-input');

            studyStart: (deckId) => {
                const due = cardStore.getDue(deckId);
                if (due.length === 0) { app.showNotification('No cards due for review!'); return; }
                state.fcStudyQueue = due; state.fcStudyIndex = 0; state.fcFlipped = false;
                state.view = 'study'; app.render();

            studyFlip: () => { state.fcFlipped = !state.fcFlipped; app.render(); },
            studyRate: (correct) => {
                const card = state.fcStudyQueue[state.fcStudyIndex];
                if (!card) return;
                if (correct) { cardStore.promote(card); } else { cardStore.demote(card); state.fcStudyQueue.push(card); }
                state.fcStudyIndex++;
                state.fcFlipped = false;
                if (state.fcStudyIndex >= state.fcStudyQueue.length) {
                    app.showNotification('Study session complete!');
                    state.view = 'decks'; state.fcCurrentDeck = card.deckId;
                }
                app.render();

            blurtCreate: () => {
                const t = document.getElementById('blurt-title');

                const s = blurtStore.add(t.value.trim(), '');
                state.blurtCurrentId = s.id; state.blurtPhase = 'read'; app.render();
            },

                const el = document.getElementById('blurt-source');

            blurtSaveRecall: () => {
                const el = document.getElementById('blurt-recall');
                if (el && state.blurtCurrentId) blurtStore.update(state.blurtCurrentId, { recall: el.value });
            },
            blurtCompare: () => { app.blurtSaveRecall(); state.blurtPhase = 'compare'; app.render(); },
            blurtSaveGaps: () => {
                const el = document.getElementById('blurt-gaps');
                if (el && state.blurtCurrentId) {
                    const s = blurtStore.get(state.blurtCurrentId);
                    blurtStore.update(state.blurtCurrentId, { gaps: el.value, reviewCount: (s?.reviewCount || 0) + 1 });
                }
            },
            blurtFinish: () => { app.blurtSaveGaps(); state.blurtPhase = 'list'; state.blurtCurrentId = null; app.render(); },
            blurtDelete: (id) => { if (!confirm('Delete this blurt session?')) return; blurtStore.remove(id); app.render(); },
            blurtReBlurt: (id) => { state.blurtCurrentId = id; state.blurtPhase = 'blurt'; app.render(); },

            exportData: () => {
                const data = {
                    decks: state.fcDecks, cards: state.fcCards, blurtSessions: state.blurtSessions,
                    pomodoroLog: state.pomodoroLog, notes: localStorage.getItem('cornellNotes') || '',
                    exportedAt: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = `synapse-backup-${new Date().toISOString().slice(0, 10)}.json`;
                a.click(); URL.revokeObjectURL(a.href);
                app.showNotification('Data exported successfully!');
            },
            importData: () => {
                const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
                input.onchange = async (e) => {
                    try {
                        const text = await e.target.files[0].text();
                        const data = JSON.parse(text);
                        if (data.decks) { state.fcDecks = data.decks; deckStore.save(); }
                        if (data.cards) { state.fcCards = data.cards; cardStore.save(); }
                        if (data.blurtSessions) { state.blurtSessions = data.blurtSessions; blurtStore.save(); }
                        if (data.pomodoroLog) { state.pomodoroLog = data.pomodoroLog; pomodoroStore.save(); }
                        if (data.notes) localStorage.setItem('cornellNotes', data.notes);
                        app.showNotification('Data imported successfully!');
                        app.render();
                    } catch (err) { app.showNotification('Import failed. Invalid file.'); }
                };
                input.click();
            },

                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                        <div class="flex gap-3">
                            <input id="new-deck-title" type="text" placeholder="New deck name..." class="flex-grow bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <button onclick="app.deckCreate()" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Create Deck</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">${state.fcDecks.length === 0 ? '<p class="text-stone-400 text-center py-8 col-span-full">No decks yet. Create one above.</p>' :
                        state.fcDecks.map(d => {
                            const cards = cardStore.getForDeck(d.id);
                            const due = cardStore.getDue(d.id).length;
                            return `<div class="card-hover bg-white dark:bg-[#292524] p-6 rounded-2xl border border-stone-100 dark:border-stone-800 cursor-pointer flex flex-col transition-all" onclick="app.deckOpen('${d.id}')">
                                <h3 class="text-xl font-serif font-bold mb-2">${esc(d.title)}</h3>
                                <p class="text-sm text-stone-500 flex-grow">${cards.length} cards &middot; ${due} due</p>
                                <div class="flex justify-between items-center mt-4">
                                    ${due > 0 ? `<button onclick="event.stopPropagation(); app.studyStart('${d.id}')" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Study</button>` : '<span class="text-xs text-stone-400 uppercase font-bold">All caught up</span>'}
                                    <button onclick="event.stopPropagation(); app.deckDelete('${d.id}')" class="text-stone-400 hover:text-red-500 text-sm">&times;</button>
                                </div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
            },

            getStudyHTML: () => {
                if (state.fcStudyIndex >= state.fcStudyQueue.length) return '<div class="text-center py-20"><h1 class="text-4xl font-serif font-bold mb-4">Session Complete!</h1><button onclick="app.navTo(\'decks\')" class="bg-orange-600 text-white px-8 py-3 rounded-2xl font-bold">Back to Decks</button></div>';
                const card = state.fcStudyQueue[state.fcStudyIndex];
                const remaining = state.fcStudyQueue.length - state.fcStudyIndex;
                return `<div class="animate-fade-in max-w-2xl mx-auto space-y-8">
                    <div class="text-center"><span class="text-sm font-bold text-stone-400 uppercase tracking-widest">${remaining} cards remaining</span></div>
                    <div class="w-full h-80 perspective-1000 cursor-pointer" onclick="app.studyFlip()">
                        <div class="relative w-full h-full text-center transform-style-3d shadow-xl rounded-2xl transition-all duration-500 ${state.fcFlipped ? 'flipped' : ''}">
                            <div class="absolute inset-0 w-full h-full bg-white dark:bg-[#292524] border border-stone-200 dark:border-stone-800 rounded-2xl backface-hidden flex flex-col items-center justify-center p-8">
                                <span class="absolute top-4 left-6 text-xs font-bold text-stone-400 uppercase tracking-widest">Box ${card.box} &middot; Front</span>
                                <h3 class="text-2xl font-serif font-bold">${esc(card.front)}</h3>
                                <p class="absolute bottom-6 text-xs text-stone-400 uppercase tracking-widest">Click to Flip</p>
                            </div>
                            <div class="absolute inset-0 w-full h-full bg-stone-900 dark:bg-stone-800 text-white rounded-2xl backface-hidden rotate-y-180 flex flex-col items-center justify-center p-8">
                                <span class="absolute top-4 left-6 text-xs font-bold text-stone-500 uppercase tracking-widest">Back</span>
                                <p class="text-xl font-medium leading-relaxed">${esc(card.back)}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-4 max-w-md mx-auto">
                        <button onclick="app.studyRate(false)" class="flex-1 bg-stone-200 dark:bg-stone-800 hover:bg-red-100 dark:hover:bg-red-900/30 hover:text-red-700 text-stone-600 dark:text-stone-400 py-3 rounded-xl font-bold text-sm transition-colors">Again (Box 1)</button>
                        <button onclick="app.studyRate(true)" class="flex-1 bg-orange-600 hover:bg-orange-500 text-white py-3 rounded-xl font-bold text-sm transition-colors">Correct (Next Box)</button>
                    </div>
                </div>`;
            },

            getBlurtHTML: () => {
                if (state.blurtPhase === 'read' && state.blurtCurrentId) {
                    const s = blurtStore.get(state.blurtCurrentId);
                    return `<div class="animate-fade-in max-w-3xl mx-auto space-y-8">
                        <div class="flex items-center gap-4"><button onclick="state.blurtPhase='list'; state.blurtCurrentId=null; app.render()" class="text-stone-400 hover:text-stone-900 dark:hover:text-white text-2xl">&larr;</button><h1 class="text-3xl font-serif font-bold">${esc(s?.title || '')}</h1></div>
                        <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                            <h3 class="text-sm font-bold uppercase text-stone-500 tracking-widest mb-4">Source Notes</h3>
                            <p class="text-xs text-stone-400 mb-3">Paste or type your study material here. When ready, hide it and blurt.</p>
                            <textarea id="blurt-source" class="w-full h-64 bg-stone-50 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none" placeholder="Paste your notes...">${esc(s?.source || '')}</textarea>
                        </div>
                        <button onclick="app.blurtStartRecall()" class="w-full bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">Hide &amp; Blurt</button>
                    </div>`;
                }
                if (state.blurtPhase === 'blurt' && state.blurtCurrentId) {
                    const s = blurtStore.get(state.blurtCurrentId);
                    return `<div class="animate-fade-in max-w-3xl mx-auto space-y-8">
                        <div class="text-center"><span class="text-orange-600 font-bold text-xs uppercase tracking-widest">Active Recall Mode</span><h1 class="text-3xl font-serif font-bold mt-2">${esc(s?.title || '')}</h1></div>
                        <div class="bg-stone-900 dark:bg-stone-800 rounded-[2rem] p-8 border border-stone-700">
                            <h3 class="text-sm font-bold uppercase text-stone-400 tracking-widest mb-4">Write everything you remember</h3>
                            <textarea id="blurt-recall" class="w-full h-64 bg-stone-800 dark:bg-stone-900 border border-stone-700 rounded-xl p-4 text-sm text-stone-100 focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none" placeholder="Blurt it all out...">${esc(s?.recall || '')}</textarea>
                        </div>
                        <button onclick="app.blurtCompare()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">Compare</button>
                    </div>`;
                }
                if (state.blurtPhase === 'compare' && state.blurtCurrentId) {
                    const s = blurtStore.get(state.blurtCurrentId);
                    return `<div class="animate-fade-in max-w-5xl mx-auto space-y-8">
                        <div class="text-center"><span class="text-orange-600 font-bold text-xs uppercase tracking-widest">Gap Analysis</span><h1 class="text-3xl font-serif font-bold mt-2">${esc(s?.title || '')}</h1></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-6 border border-stone-100 dark:border-stone-800">
                                <h3 class="text-sm font-bold uppercase text-stone-500 tracking-widest mb-3">Original Source</h3>
                                <div class="text-sm text-stone-600 dark:text-stone-300 whitespace-pre-wrap leading-relaxed">${esc(s?.source || '')}</div>
                            </div>
                            <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-6 border border-stone-100 dark:border-stone-800">
                                <h3 class="text-sm font-bold uppercase text-stone-500 tracking-widest mb-3">Your Recall</h3>
                                <div class="text-sm text-stone-600 dark:text-stone-300 whitespace-pre-wrap leading-relaxed">${esc(s?.recall || '')}</div>
                            </div>
                        </div>
                        <div class="bg-orange-50 dark:bg-orange-900/20 rounded-[2rem] p-6 border border-orange-200 dark:border-orange-800">
                            <h3 class="text-sm font-bold uppercase text-orange-600 tracking-widest mb-3">Fill in the Gaps</h3>
                            <textarea id="blurt-gaps" class="w-full h-32 bg-white dark:bg-stone-800 border border-orange-200 dark:border-orange-700 rounded-xl p-4 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none" placeholder="What did you miss?">${esc(s?.gaps || '')}</textarea>
                        </div>
                        <button onclick="app.blurtFinish()" class="w-full bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">Save &amp; Finish</button>
                    </div>`;
                }
                return `<div class="animate-fade-in max-w-3xl mx-auto space-y-8">
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-serif font-bold mb-4">The Blurting Method</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">Read. Hide. Blurt. Compare. Fill gaps.</p>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                        <div class="flex gap-3">
                            <input id="blurt-title" type="text" placeholder="Session title (e.g. Biology Ch. 5)" class="flex-grow bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                            <button onclick="app.blurtCreate()" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">New Session</button>
                        </div>
                    </div>
                    <div class="space-y-4">${state.blurtSessions.length === 0 ? '<p class="text-stone-400 text-center py-8">No blurt sessions yet.</p>' :
                        state.blurtSessions.map(s => `<div class="bg-white dark:bg-[#292524] p-6 rounded-2xl border border-stone-100 dark:border-stone-800 flex items-center gap-4">
                            <div class="flex-grow">
                                <h3 class="font-semibold">${esc(s.title)}</h3>
                                <p class="text-xs text-stone-400">${s.reviewCount} reviews &middot; ${new Date(s.updatedAt).toLocaleDateString()}</p>
                            </div>
                            <button onclick="app.blurtOpen('${s.id}')" class="bg-stone-100 dark:bg-stone-800 px-4 py-2 rounded-lg text-xs font-bold uppercase text-stone-600 dark:text-stone-300">Review</button>
                            <button onclick="app.blurtReBlurt('${s.id}')" class="bg-orange-100 dark:bg-orange-900/30 px-4 py-2 rounded-lg text-xs font-bold uppercase text-orange-600">Re-Blurt</button>
                            <button onclick="app.blurtDelete('${s.id}')" class="text-stone-400 hover:text-red-500">&times;</button>
                        </div>`).join('')}
                    </div>
                </div>`;
            },

            getStatsHTML: () => {
                const totalTime = pomodoroStore.totalFocusTime();
                const totalSessions = pomodoroStore.totalSessions();
                const hours = Math.floor(totalTime / 3600);
                const mins = Math.floor((totalTime % 3600) / 60);
                const taskCounts = {};
                state.pomodoroLog.filter(p => p.task !== '__breakdown__').forEach(p => { taskCounts[p.task] = (taskCounts[p.task] || 0) + 1; });
                const topTasks = Object.entries(taskCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

                return `<div class="animate-fade-in max-w-4xl mx-auto space-y-8">
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-serif font-bold mb-4">Session Stats</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">Your learning journey at a glance</p>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                        <div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center">
                            <div class="text-4xl font-serif font-bold text-orange-600">${totalSessions}</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Focus Sessions</div>
                        </div>
                        <div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center">
                            <div class="text-4xl font-serif font-bold text-orange-600">${hours}h ${mins}m</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Total Focus Time</div>
                        </div>
                        <div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center">
                            <div class="text-4xl font-serif font-bold text-orange-600">${state.fcDecks.length}</div>
                            <div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Flashcard Decks</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                        <h3 class="text-lg font-serif font-bold mb-4">Weekly Activity</h3>
                        <div class="chart-container"><canvas id="weeklyChart"></canvas></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                            <h3 class="text-lg font-serif font-bold mb-4">Top Tasks</h3>
                            ${topTasks.length === 0 ? '<p class="text-stone-400 text-sm">Complete some focus sessions to see your top tasks.</p>' :
                            `<div class="space-y-3">${topTasks.map(([task, count]) => `<div class="flex items-center gap-3">
                                <div class="flex-grow bg-stone-100 dark:bg-stone-800 rounded-full h-3 overflow-hidden"><div class="bg-orange-600 h-full rounded-full" style="width: ${(count / topTasks[0][1]) * 100}%"></div></div>
                                <span class="text-sm font-medium w-20 text-right">${esc(task)}</span>
                                <span class="text-xs text-stone-400 font-bold w-8">${count}</span>
                            </div>`).join('')}</div>`}
                        </div>
                        <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">
                            <h3 class="text-lg font-serif font-bold mb-4">Data Management</h3>
                            <p class="text-sm text-stone-500 mb-6">Export all your data (decks, blurt sessions, notes, timer history) or import a previous backup.</p>
                            <div class="flex gap-3">
                                <button onclick="app.exportData()" class="flex-1 bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Export</button>
                                <button onclick="app.importData()" class="flex-1 bg-stone-200 dark:bg-stone-700 text-stone-700 dark:text-stone-200 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Import</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            },

            renderCharts: () => {
                if (app.charts.scatter) app.charts.scatter.destroy();
                if (app.charts.doughnut) app.charts.doughnut.destroy();
                const isDark = document.body.classList.contains('dark');
                const gridColor = isDark ? '#44403c' : '#e7e5e4';
                const textColor = isDark ? '#a8a29e' : '#78716c';

                const scatterCanvas = document.getElementById('efficiencyChart');
                if (scatterCanvas) {
                    app.charts.scatter = new Chart(scatterCanvas, {
                        type: 'scatter',
                        data: { datasets: [{ label: 'Techniques', data: learningData.map(t => ({ x: t.effort, y: t.efficiency, label: t.title })), backgroundColor: '#ea580c', borderColor: '#ea580c', pointRadius: 8, pointHoverRadius: 12 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw.label}: Effort ${ctx.raw.x}, Efficiency ${ctx.raw.y}` } } }, scales: { x: { title: { display: true, text: 'Effort', color: textColor }, grid: { color: gridColor }, ticks: { color: textColor } }, y: { title: { display: true, text: 'Efficiency', color: textColor }, grid: { color: gridColor }, ticks: { color: textColor } } } }
                    });
                }
                const doughnutCanvas = document.getElementById('distributionChart');
                if (doughnutCanvas) {
                    const categories = {};
                    learningData.forEach(t => { categories[t.category] = (categories[t.category] || 0) + 1; });
                    app.charts.doughnut = new Chart(doughnutCanvas, {
                        type: 'doughnut',
                        data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#ea580c', '#78716c', '#d6d3d1', '#292524', '#f59e0b'] }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { family: 'Inter' } } } } }
                    });
                }
            },

            renderStatsCharts: () => {
                const isDark = document.body.classList.contains('dark');
                const textColor = isDark ? '#a8a29e' : '#78716c';
                const gridColor = isDark ? '#44403c' : '#e7e5e4';
                const weeklyCanvas = document.getElementById('weeklyChart');
                if (weeklyCanvas) {
                    const days = pomodoroStore.recentDays(7);
                    new Chart(weeklyCanvas, {
                        type: 'bar',
                        data: { labels: days.map(d => d.label), datasets: [{ label: 'Sessions', data: days.map(d => d.count), backgroundColor: '#ea580c', borderRadius: 8 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textColor } }, y: { beginAtZero: true, ticks: { stepSize: 1, color: textColor }, grid: { color: gridColor } } } }
                    });
                }
            },

            showAbout: () => alert("Synapse OS v5.0 - Interactive Learning OS")
        };

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
