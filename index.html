    <script type="module">
        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const firebaseConfig = JSON.parse(__firebase_config);
            const app_fb = initializeApp(firebaseConfig);
            window.fb = {
                auth: getAuth(app_fb), db: getFirestore(app_fb),
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',
                doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc,
                signInAnonymously, signInWithCustomToken, onAuthStateChanged
            };
        } catch(e) {
            console.warn("Firebase not configured, running in local-only mode.", e.message);
            window.fb = null;
        }
    </script>

    <script>
        function esc(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str || ''));
            return d.innerHTML;
        }

        function mdToHtml(str) {
            if (!str) return '';
            let h = esc(str);
            h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
            h = h.replace(/^### (.+)$/gm, '<h4 class="text-lg font-serif font-bold text-white mt-4 mb-1">$1</h4>');
            h = h.replace(/^## (.+)$/gm, '<h3 class="text-xl font-serif font-bold text-white mt-5 mb-2">$1</h3>');
            h = h.replace(/^# (.+)$/gm, '<h2 class="text-2xl font-serif font-bold text-white mt-6 mb-2">$1</h2>');
            h = h.replace(/^\s*[-•]\s+(.+)$/gm, '<li class="ml-4 mb-1">$1</li>');
            h = h.replace(/(<li[^>]*>.*<\/li>\n?)+/g, '<ul class="list-disc pl-4 my-2">$&</ul>');
            h = h.replace(/^\d+\.\s+(.+)$/gm, '<li class="ml-4 mb-1">$1</li>');
            h = h.replace(/\n{2,}/g, '</p><p class="mb-3">');
            h = '<p class="mb-3">' + h + '</p>';
            h = h.replace(/<p class="mb-3"><\/p>/g, '');
            return h;
        }

                    const response = await fetch('/api/gemini', { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        return err.error || "API error occurred.";
                    }
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";

                    return "Failed to contact the AI Mission Core.";

        const mcqStore = {
            load() {
                try {
                    const d = JSON.parse(localStorage.getItem('synapse_mcq') || '{}');
                    state.mcqAttempts = d.attempts || {};
                    state.mcqGaps = d.gaps || [];
                    state.mcqReflections = d.reflections || {};
                } catch(e) { state.mcqAttempts = {}; state.mcqGaps = []; state.mcqReflections = {}; }
            },
            save() {
                localStorage.setItem('synapse_mcq', JSON.stringify({
                    attempts: state.mcqAttempts,
                    gaps: state.mcqGaps,
                    reflections: state.mcqReflections
                }));
            },
            recordAttempt(missionIdx, answers, correct, total) {
                if (!state.mcqAttempts[missionIdx]) state.mcqAttempts[missionIdx] = [];
                state.mcqAttempts[missionIdx].push({ answers, correct, total, date: new Date().toISOString() });
                this.save();
            },
            addGaps(concepts) {
                concepts.forEach(c => { if (!state.mcqGaps.includes(c)) state.mcqGaps.push(c); });
                this.save();
            },
            removeGap(concept) {
                state.mcqGaps = state.mcqGaps.filter(g => g !== concept);
                this.save();
            },
            saveReflection(missionIdx, text) {
                state.mcqReflections[missionIdx] = text;
                this.save();
            },
            getBestScore(missionIdx) {
                const attempts = state.mcqAttempts[missionIdx] || [];
                if (attempts.length === 0) return null;
                return Math.max(...attempts.map(a => a.correct));
            },
            getAttemptCount(missionIdx) {
                return (state.mcqAttempts[missionIdx] || []).length;
            }
        };

        const deckStore = {

            save() { localStorage.setItem('synapse_decks', JSON.stringify(state.fcDecks)); },
            add(title) { const d = { id: Date.now().toString(), title, createdAt: Date.now() }; state.fcDecks.push(d); this.save(); return d; },
            remove(id) { state.fcDecks = state.fcDecks.filter(d => d.id !== id); cardStore.removeByDeck(id); this.save(); },

        const cardStore = {
            load() { try { state.fcCards = JSON.parse(localStorage.getItem('synapse_cards') || '[]'); } catch(e) { state.fcCards = []; } },
            save() { localStorage.setItem('synapse_cards', JSON.stringify(state.fcCards)); },
            add(deckId, front, back) {
                const c = { id: Date.now().toString(), deckId, front, back, box: 1, nextReview: Date.now(), createdAt: Date.now() };
                state.fcCards.push(c); this.save(); return c;
            },
            remove(id) { state.fcCards = state.fcCards.filter(c => c.id !== id); this.save(); },
            removeByDeck(deckId) { state.fcCards = state.fcCards.filter(c => c.deckId !== deckId); this.save(); },
            getForDeck(deckId) { return state.fcCards.filter(c => c.deckId === deckId); },
            getDue(deckId) { const now = Date.now(); return this.getForDeck(deckId).filter(c => c.nextReview <= now); },
            promote(card) {
                const intervals = [0, 1, 3, 7, 14, 30];
                card.box = Math.min(card.box + 1, 5);
                card.nextReview = Date.now() + intervals[card.box] * 86400000;
                this.save();
            },
            demote(card) { card.box = 1; card.nextReview = Date.now(); this.save(); }
        };

        const pomodoroStore = {
            load() { try { state.pomodoroLog = JSON.parse(localStorage.getItem('synapse_pomodoro_log') || '[]'); } catch(e) { state.pomodoroLog = []; } },
            save() { localStorage.setItem('synapse_pomodoro_log', JSON.stringify(state.pomodoroLog)); },
            normalize(label) { return label.trim().replace(/\s+/g, ' ').toLowerCase(); },
            log(taskLabel) { state.pomodoroLog.push({ task: this.normalize(taskLabel), completedAt: Date.now(), duration: state.timerInitialSeconds }); this.save(); },
            consecutiveCount(taskLabel) {
                const key = this.normalize(taskLabel);
                if (!key) return 0;
                let count = 0;
                for (let i = state.pomodoroLog.length - 1; i >= 0; i--) {
                    if (state.pomodoroLog[i].task === key) count++;
                    else break;
                }
                return count;
            },
            clearStreak() { state.pomodoroLog.push({ task: '__breakdown__', completedAt: Date.now() }); this.save(); },
            totalFocusTime() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.duration).reduce((s, p) => s + p.duration, 0); },
            totalSessions() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__').length; },
            recentDays(n) {
                const now = Date.now();
                const days = [];
                for (let i = n - 1; i >= 0; i--) {
                    const dayStart = new Date(now - i * 86400000); dayStart.setHours(0,0,0,0);
                    const dayEnd = new Date(dayStart); dayEnd.setHours(23,59,59,999);
                    const count = state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.completedAt >= dayStart.getTime() && p.completedAt <= dayEnd.getTime()).length;
                    days.push({ label: dayStart.toLocaleDateString('en', { weekday: 'short' }), count });
                }
                return days;
            }
        };

                const sorted = [...log].sort().reverse();
                const today = new Date().toISOString().slice(0, 10);
                const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
                let streak = 1;
                for (let i = 1; i < sorted.length; i++) {
                    const prev = new Date(sorted[i - 1]);
                    const curr = new Date(sorted[i]);
                    const diff = (prev - curr) / 86400000;
                    if (diff === 1) streak++;
                    else break;
                }
                return streak;
            },

                state.rankEvidence.pomodorosCompleted++;
                this.save();
                this.checkPromotion();

                state.rankEvidence.governorBreakdowns++;

            checkPromotion() {
                const currentIdx = RANKS.indexOf(state.rank);
                if (currentIdx >= RANKS.length - 1) return;
                const nextRank = RANKS[currentIdx + 1];
                const reqs = RANK_REQUIREMENTS[nextRank];
                if (!reqs) return;
                const ev = state.rankEvidence;
                const met = ev.blurtsCompleted >= reqs.blurtsCompleted &&
                            ev.governorBreakdowns >= reqs.governorBreakdowns &&
                            ev.cardsAdvanced >= reqs.cardsAdvanced &&
                            ev.activeDays >= reqs.activeDays &&
                            ev.pomodorosCompleted >= reqs.pomodorosCompleted &&
                            (ev.diagnosticsCompleted || 0) >= reqs.diagnosticsCompleted;
                if (met) {
                    state.rank = nextRank;
                    this.save();
                    this.updateNavRank();
                    app.showNotification(`Rank Promotion: You are now ${nextRank}!`);
                    this.checkPromotion();
                }

                const next = this.getNextRank();
                if (!next) return null;

            quizStart: async () => {
                const catEl = document.getElementById('quiz-category');
                const diffEl = document.getElementById('quiz-difficulty');
                state.quizCategory = catEl ? catEl.value : '';
                state.quizDifficulty = diffEl ? diffEl.value : 'medium';
                state.quizPhase = 'loading'; app.render();
                try {
                    let url = `https://opentdb.com/api.php?amount=10&type=multiple&difficulty=${state.quizDifficulty}`;
                    if (state.quizCategory) url += `&category=${state.quizCategory}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!data.results || data.results.length === 0) { app.showNotification('No questions found. Try a different category.'); state.quizPhase = 'setup'; app.render(); return; }
                    state.quizQuestions = data.results.map(q => {
                        const answers = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);
                        return { question: q.question, correct: q.correct_answer, answers, category: q.category };
                    });
                    state.quizIndex = 0; state.quizScore = 0; state.quizStreak = 0; state.quizAnswered = false;
                    state.quizSelectedAnswer = null; state.quizSessionCorrect = 0; state.quizSessionTotal = 0;
                    state.quizPhase = 'playing'; state.quizTimer = 15;
                    app.render(); app.startQuizTimer();
                } catch(e) { app.showNotification('Failed to load questions. Check your connection.'); state.quizPhase = 'setup'; app.render(); }
            },
            startQuizTimer: () => {
                clearInterval(state.quizTimerInterval);
                state.quizTimer = 15; app.updateQuizTimerUI();
                state.quizTimerInterval = setInterval(() => {
                    state.quizTimer--;
                    app.updateQuizTimerUI();
                    if (state.quizTimer <= 0) { clearInterval(state.quizTimerInterval); if (!state.quizAnswered) app.quizAnswer(null); }
                }, 1000);
            },
            updateQuizTimerUI: () => {
                const el = document.getElementById('quiz-timer-text');
                const ring = document.getElementById('quiz-timer-ring');
                if (el) el.textContent = state.quizTimer;
                if (ring) { const c = 2 * Math.PI * 20; ring.style.strokeDasharray = `${c} ${c}`; ring.style.strokeDashoffset = c - (state.quizTimer / 15) * c; }
            },
            quizAnswer: (ansIdx) => {
                if (state.quizAnswered) return;
                state.quizAnswered = true;
                clearInterval(state.quizTimerInterval);
                const q = state.quizQuestions[state.quizIndex];
                const answer = ansIdx !== null ? q.answers[ansIdx] : null;
                const correct = answer === q.correct;
                state.quizSelectedAnswer = answer;
                state.quizSessionTotal++;
                if (correct) { state.quizStreak++; state.quizSessionCorrect++; } else { state.quizStreak = 0; }
                app.render();
            },
            quizNext: () => {
                state.quizIndex++;
                state.quizAnswered = false;
                state.quizSelectedAnswer = null;
                if (state.quizIndex >= state.quizQuestions.length) {
                    state.quizPhase = 'results';
                    app.render(); return;
                }
                state.quizTimer = 15;
                app.render(); app.startQuizTimer();
            },
            quizReset: () => { clearInterval(state.quizTimerInterval); state.quizPhase = 'setup'; state.quizQuestions = []; app.render(); },
            decodeHTML: (html) => { const d = document.createElement('div'); d.innerHTML = html; return d.textContent; },

                const mission = mcqBank[state.mcqMissionIdx];
                const gaps = [];
                let correct = 0;
                mission.questions.forEach(q => {
                    if (state.mcqAnswers[q.id] === q.answer) correct++;
                    else gaps.push(q.concept);
                });
                mcqStore.recordAttempt(state.mcqMissionIdx, {...state.mcqAnswers}, correct, mission.questions.length);
                if (gaps.length > 0) mcqStore.addGaps(gaps);
                rankEngine.recordDiagnostic();
                state.mcqShowResults = true;
                state.mcqView = 'results';
                const completedMissions = mcqBank.filter((m, i) => mcqStore.getAttemptCount(i) > 0).length;
                if (completedMissions >= mcqBank.length) {
                    app.showNotification('🏅 Diagnostics Journey Complete! You earned the Explorer badge and bonus rank evidence!');
                    const djTodo = state.missionTodos.find(t => t.text === 'Complete the Diagnostics Journey');
                    if (djTodo && !djTodo.done) { djTodo.done = true; todoStore.save(); }
                }
                app.render();
            },
            mcqSaveReflection() {
                const el = document.getElementById('mcq-reflection-input');
                if (el && el.value.trim()) {
                    mcqStore.saveReflection(state.mcqMissionIdx, el.value.trim());
                    app.showNotification('Reflection saved.');
                    app.render();
                }
            },
            mcqBackToList() {
                state.mcqView = 'list';
                state.mcqShowResults = false;
                state.mcqAnswers = {};
                app.render();
            },

            getDiagnosticHTML() {
                if (state.mcqView === 'orient') return app.getMcqOrientHTML();
                if (state.mcqView === 'questions') return app.getMcqQuestionHTML();
                if (state.mcqView === 'results') return app.getMcqResultsHTML();
                return app.getMcqListHTML();
            },

            getMcqListHTML() {
                const hasActivity = app.mcqHasActivity();
                const completedMissions = mcqBank.filter((m, i) => mcqStore.getAttemptCount(i) > 0).length;
                const journeyComplete = completedMissions >= mcqBank.length;
                return `<div class="animate-fade-in max-w-4xl mx-auto space-y-8">
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-serif font-bold mb-4">Navigation Check</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">Systems diagnostic — confirm what you've learned, reveal what needs practice.</p>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-6 border border-stone-100 dark:border-stone-800 shadow-sm">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="text-base font-serif font-bold">🛰️ Diagnostics Journey ${journeyComplete ? '<span class="text-green-600 text-sm ml-2">🏅 Complete!</span>' : ''}</h3>
                            <span class="text-xs font-bold ${journeyComplete ? 'text-green-600' : 'text-orange-600'}">${completedMissions} / ${mcqBank.length} missions</span>
                        </div>
                        <div class="w-full bg-stone-100 dark:bg-stone-800 rounded-full h-2.5 overflow-hidden mb-3"><div class="h-full rounded-full transition-all ${journeyComplete ? 'bg-green-500' : 'bg-orange-600'}" style="width:${(completedMissions / mcqBank.length) * 100}%"></div></div>
                        <p class="text-xs text-stone-500 dark:text-stone-400">${journeyComplete ? 'You earned the Explorer badge! Each completed diagnostic counts toward your rank promotion.' : 'Complete all 5 missions to earn the Explorer badge and bonus rank evidence. Each diagnostic you finish counts toward your promotion!'}</p>
                    </div>
                    ${!hasActivity ? '<div class="bg-amber-50 dark:bg-amber-900/20 rounded-[2rem] p-6 border border-amber-200 dark:border-amber-800 text-center"><p class="text-sm font-semibold text-amber-700 dark:text-amber-400">🔒 Complete a study activity first (focus session, blurt, or flashcard review) to unlock diagnostics.</p></div>' : ''}
                    <div class="bg-orange-50 dark:bg-orange-900/20 rounded-[2rem] p-6 border border-orange-200 dark:border-orange-800">
                        <h3 class="text-base font-serif font-bold text-orange-700 dark:text-orange-400 mb-3">📋 How this works</h3>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center">
                                <div class="text-2xl mb-1">1️⃣</div>
                                <p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Study first using the tools (focus timer, flashcards, blurting).</p>
                            </div>
                            <div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center">
                                <div class="text-2xl mb-1">2️⃣</div>
                                <p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Run a diagnostic to check what you remember — no pressure, no timer.</p>
                            </div>
                            <div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center">
                                <div class="text-2xl mb-1">3️⃣</div>
                                <p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Review your gaps and practice the concepts you missed.</p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${mcqBank.map((m, idx) => {
                            const attempts = mcqStore.getAttemptCount(idx);
                            const best = mcqStore.getBestScore(idx);
                            const total = m.questions.length;
                            const statusLabel = best === null ? 'Not attempted' : best + '/' + total + ' stable';
                            const statusColor = best === null ? 'text-stone-400' : best >= total * 0.8 ? 'text-green-600' : best >= total * 0.5 ? 'text-orange-600' : 'text-red-500';
                            const orbitLabel = best === null ? '⚪' : best >= total * 0.8 ? '🟢 Stable Orbit' : best >= total * 0.5 ? '🟠 Adjusting' : '🔴 Unstable';
                            return '<div class="bg-white dark:bg-[#292524] rounded-2xl p-6 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                                '<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">' +
                                '<div class="flex-grow">' +
                                '<h3 class="text-lg font-serif font-bold text-stone-900 dark:text-stone-50">' + esc(m.mission) + '</h3>' +
                                '<p class="text-xs text-stone-500 dark:text-stone-400 mt-1">' + esc(m.subtitle) + ' &middot; ' + total + ' questions</p>' +
                                '<div class="flex items-center gap-3 mt-2"><span class="text-xs font-bold ' + statusColor + '">' + statusLabel + '</span>' +
                                (attempts > 0 ? '<span class="text-[10px] text-stone-400">' + attempts + ' attempt' + (attempts > 1 ? 's' : '') + '</span>' : '') +
                                '<span class="text-xs">' + orbitLabel + '</span></div>' +
                                '</div>' +
                                '<button onclick="app.mcqStartMission(' + idx + ')" class="bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest ' + (!hasActivity ? 'opacity-40 pointer-events-none' : 'hover:bg-stone-700 dark:hover:bg-stone-300') + ' transition-colors">Run Diagnostic</button>' +
                                '</div></div>';
                        }).join('')}
                    </div>
                    ${state.mcqGaps.length > 0 ? '<div class="bg-white dark:bg-[#292524] rounded-2xl p-6 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-3">🔍 Knowledge Gaps Detected</h3>' +
                        '<p class="text-xs text-stone-500 mb-3">These concepts need more practice. Use blurting, flashcards, or the Feynman technique to strengthen them.</p>' +
                        '<div class="flex flex-wrap gap-2">' + state.mcqGaps.map(g =>
                            '<span class="inline-flex items-center gap-1 bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-400 px-3 py-1 rounded-lg text-xs font-bold">' + esc(g) +
                            '<button onclick="mcqStore.removeGap(&quot;' + g.replace(/"/g, '') + '&quot;); app.render();" class="text-red-400 hover:text-red-600 ml-1">✕</button></span>'
                        ).join('') + '</div></div>' : ''}
                </div>`;
            },

            getMcqOrientHTML() {
                const m = mcqBank[state.mcqMissionIdx];
                return `<div class="animate-fade-in max-w-2xl mx-auto space-y-8">
                    <div class="text-center">
                        <button onclick="app.mcqBackToList()" class="text-sm text-stone-400 hover:text-orange-600 mb-4 inline-block">&larr; Back to missions</button>
                        <h1 class="text-4xl font-serif font-bold mb-2">${esc(m.mission)}</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">${esc(m.subtitle)}</p>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm space-y-6">
                        <div class="bg-orange-50 dark:bg-orange-900/20 rounded-2xl p-6 border border-orange-200 dark:border-orange-800">
                            <h3 class="font-serif font-bold text-orange-700 dark:text-orange-400 mb-2">🛰️ Mission Briefing</h3>
                            <p class="text-sm text-stone-700 dark:text-stone-300 leading-relaxed">${esc(m.description)}</p>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-start gap-3"><span class="text-lg">📋</span><p class="text-sm text-stone-600 dark:text-stone-300"><strong>20 questions</strong> — answer from memory, no notes.</p></div>
                            <div class="flex items-start gap-3"><span class="text-lg">⏳</span><p class="text-sm text-stone-600 dark:text-stone-300"><strong>No time limit</strong> — take as long as you need.</p></div>
                            <div class="flex items-start gap-3"><span class="text-lg">🔍</span><p class="text-sm text-stone-600 dark:text-stone-300"><strong>Not a test</strong> — this is a diagnostic to find gaps, not judge you.</p></div>
                        </div>
                        <button onclick="app.mcqBeginQuestions()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold text-sm uppercase tracking-widest transition-all">Begin Navigation Check</button>
                    </div>
                </div>`;
            },

            getMcqQuestionHTML() {
                const m = mcqBank[state.mcqMissionIdx];
                const q = m.questions[state.mcqQuestionIdx];
                const total = m.questions.length;
                const idx = state.mcqQuestionIdx;
                const selected = state.mcqAnswers[q.id] || null;
                const answeredCount = Object.keys(state.mcqAnswers).length;
                const allAnswered = answeredCount === total;
                return `<div class="animate-fade-in max-w-2xl mx-auto space-y-6">
                    <div class="flex items-center justify-between">
                        <button onclick="app.mcqBackToList()" class="text-sm text-stone-400 hover:text-orange-600">&larr; Exit</button>
                        <span class="text-xs font-bold text-stone-400 uppercase tracking-widest">${esc(m.mission)}</span>
                        <span class="text-xs font-bold text-orange-600">${idx + 1} / ${total}</span>
                    </div>
                    <div class="w-full bg-stone-100 dark:bg-stone-800 rounded-full h-1.5 overflow-hidden"><div class="h-full rounded-full bg-orange-600 transition-all" style="width:${((idx + 1) / total) * 100}%"></div></div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm">
                        <p class="text-lg font-serif font-semibold text-stone-900 dark:text-stone-50 mb-6 leading-relaxed">${esc(q.question)}</p>
                        <div class="space-y-3">
                            ${q.options.map(opt => {
                                const letter = opt.charAt(0);
                                const isSelected = selected === letter;
                                return '<button onclick="app.mcqSelectAnswer(' + q.id + ', &quot;' + letter + '&quot;)" class="w-full text-left p-4 rounded-xl border-2 transition-all text-sm font-medium ' +
                                    (isSelected ? 'border-orange-600 bg-orange-50 dark:bg-orange-900/20 text-orange-700 dark:text-orange-300' : 'border-stone-200 dark:border-stone-700 hover:border-stone-300 dark:hover:border-stone-600 text-stone-700 dark:text-stone-300') + '">' + esc(opt) + '</button>';
                            }).join('')}
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <button onclick="app.mcqPrevQuestion()" class="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest ${idx === 0 ? 'opacity-30 pointer-events-none' : ''} bg-stone-200 dark:bg-stone-700 text-stone-600 dark:text-stone-300">Previous</button>
                        ${idx < total - 1 ?
                            '<button onclick="app.mcqNextQuestion()" class="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900">Next</button>' :
                            '<button onclick="app.mcqSubmit()" class="px-5 py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest ' + (allAnswered ? 'bg-orange-600 text-white hover:bg-orange-500' : 'bg-stone-300 text-stone-500 pointer-events-none opacity-50') + '">Complete Diagnostic</button>'
                        }
                    </div>
                    <div class="flex flex-wrap gap-1.5 justify-center">${m.questions.map((mq, i) => {
                        const answered = state.mcqAnswers[mq.id];
                        const current = i === idx;
                        return '<button onclick="state.mcqQuestionIdx=' + i + '; app.render();" class="w-7 h-7 rounded-lg text-[10px] font-bold ' +
                            (current ? 'bg-orange-600 text-white' : answered ? 'bg-orange-100 dark:bg-orange-900/30 text-orange-600' : 'bg-stone-100 dark:bg-stone-800 text-stone-400') + '">' + (i+1) + '</button>';
                    }).join('')}</div>
                </div>`;
            },

            getMcqResultsHTML() {
                const m = mcqBank[state.mcqMissionIdx];
                const attempts = state.mcqAttempts[state.mcqMissionIdx] || [];
                const latest = attempts[attempts.length - 1];
                const correct = latest ? latest.correct : 0;
                const total = m.questions.length;
                const gaps = [];
                const stable = [];
                m.questions.forEach(q => {
                    if (state.mcqAnswers[q.id] === q.answer) stable.push(q);
                    else gaps.push(q);
                });
                const pct = Math.round((correct / total) * 100);
                const orbitStatus = pct >= 80 ? '🟢 Stable Orbit' : pct >= 50 ? '🟠 Adjusting Course' : '🔴 Unstable — Review Needed';
                const reflection = state.mcqReflections[state.mcqMissionIdx] || '';
                return `<div class="animate-fade-in max-w-2xl mx-auto space-y-8">
                    <div class="text-center">
                        <h1 class="text-4xl font-serif font-bold mb-2">Diagnostic Complete</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">${esc(m.mission)}</p>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm text-center">
                        <div class="text-5xl font-serif font-bold text-orange-600 mb-2">${correct} / ${total}</div>
                        <p class="text-sm font-bold">${orbitStatus}</p>
                        <div class="w-full bg-stone-100 dark:bg-stone-800 rounded-full h-3 overflow-hidden mt-4"><div class="h-full rounded-full ${pct >= 80 ? 'bg-green-500' : pct >= 50 ? 'bg-orange-600' : 'bg-red-500'} transition-all" style="width:${pct}%"></div></div>
                    </div>
                    ${gaps.length > 0 ? '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-1 text-red-600">🔍 Knowledge Gaps Detected</h3>' +
                        '<p class="text-xs text-stone-500 mb-4">These concepts were not recalled correctly. Practice them using blurting, flashcards, or explanation.</p>' +
                        '<div class="space-y-3">' + gaps.map(q => {
                            const userAns = state.mcqAnswers[q.id] || '—';
                            const userOpt = q.options.find(o => o.charAt(0) === userAns) || '—';
                            const correctOpt = q.options.find(o => o.charAt(0) === q.answer);
                            return '<div class="bg-red-50 dark:bg-red-900/10 rounded-xl p-4 border border-red-100 dark:border-red-900/30">' +
                                '<p class="text-sm font-semibold text-stone-800 dark:text-stone-200 mb-2">' + esc(q.question) + '</p>' +
                                '<p class="text-xs text-red-600">Your answer: ' + esc(userOpt) + '</p>' +
                                '<p class="text-xs text-green-600">Correct: ' + esc(correctOpt) + '</p>' +
                                '<span class="inline-block mt-2 bg-red-100 dark:bg-red-900/20 text-red-700 dark:text-red-400 px-2 py-0.5 rounded text-[10px] font-bold">Gap: ' + esc(q.concept) + '</span>' +
                                '</div>';
                        }).join('') + '</div></div>' : ''}
                    ${stable.length > 0 ? '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-3 text-green-600">✅ Stable Concepts (' + stable.length + ')</h3>' +
                        '<div class="flex flex-wrap gap-2">' + stable.map(q =>
                            '<span class="bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-400 px-3 py-1 rounded-lg text-xs font-bold">' + esc(q.concept) + '</span>'
                        ).join('') + '</div></div>' : ''}
                    <div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm">
                        <h3 class="text-lg font-serif font-bold mb-3">💭 Reflection</h3>
                        <p class="text-xs text-stone-500 mb-3">What changed in how you think about this topic? What will you practise next?</p>
                        <textarea id="mcq-reflection-input" rows="3" class="w-full bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500 resize-none">${esc(reflection)}</textarea>
                        <button onclick="app.mcqSaveReflection()" class="mt-2 bg-orange-600 hover:bg-orange-500 text-white px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-colors">Save Reflection</button>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="app.mcqBackToList()" class="flex-1 bg-stone-200 dark:bg-stone-700 text-stone-700 dark:text-stone-200 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Back to Missions</button>
                        <button onclick="app.mcqStartMission(${state.mcqMissionIdx})" class="flex-1 bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Retry After Practice</button>
                    </div>
                </div>`;
            },

            showAbout: () => alert("Synapse OS v7.0 - Interactive Learning OS with Rank System")
        };

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
