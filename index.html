<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse - Interactive Learning OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <script type="module">
        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
            const { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
            const { getFirestore, doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            const firebaseConfig = JSON.parse(__firebase_config);
            const app_fb = initializeApp(firebaseConfig);
            window.fb = {
                auth: getAuth(app_fb), db: getFirestore(app_fb),
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',
                doc, getDoc, setDoc, collection, addDoc, updateDoc, getDocs, deleteDoc,
                signInAnonymously, signInWithCustomToken, onAuthStateChanged
            };
        } catch(e) {
            console.warn("Firebase not configured, running in local-only mode.", e.message);
            window.fb = null;
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], serif: ['Lora', 'serif'] },
                    colors: { stone: { 850: '#1f1c1a' } }
                }
            }
        }
    </script>

    <style>
        :root { --bg-color: #FDFCF8; --text-color: #2D2A26; }
        .dark { background-color: #1c1917; color: #e7e5e4; --bg-color: #1c1917; --text-color: #e7e5e4; }
        .dark .bg-white { background-color: #292524 !important; }
        .dark .text-stone-900 { color: #f5f5f4 !important; }
        .dark h1, .dark h2, .dark h3, .dark h4 { color: #f5f5f4 !important; }
        .dark .bg-stone-50 { background-color: #1c1917 !important; }
        .dark .border-stone-100, .dark .border-stone-200, .dark .border-stone-800 { border-color: #44403c !important; }
        .dark .text-stone-500, .dark .text-stone-600 { color: #a8a29e !important; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s ease, color 0.3s ease; line-height: 1.6; }
        h1, h2, h3, h4 { font-family: 'Lora', serif; letter-spacing: -0.02em; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flipped { transform: rotateY(180deg); }
        .cornell-notes { min-height: 400px; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 24px 24px; padding: 2.5rem; line-height: 2; outline: none; border-radius: 1.5rem; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.05); font-family: 'Inter', sans-serif; font-size: 1.1rem; }
        .dark .cornell-notes { background-image: radial-gradient(#3f3a36 1px, transparent 1px); background-color: #292524; }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; height: 300px; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ai-loader { border: 2px solid #f3f3f3; border-top: 2px solid #ea580c; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input[type="checkbox"] { accent-color: #ea580c; width: 1.1rem; height: 1.1rem; cursor: pointer; }
        .timer-circle { transition: stroke-dashoffset 1s linear; }
        .quiz-timer-ring { transition: stroke-dashoffset 1s linear; }
    </style>
</head>
<body class="antialiased selection:bg-orange-100 dark:selection:bg-orange-900 selection:text-orange-900 dark:selection:text-orange-100 font-sans">

    <nav class="sticky top-0 z-50 bg-[#FDFCF8]/90 dark:bg-[#1c1917]/90 backdrop-blur-md border-b border-stone-200 dark:border-stone-800 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="app.navTo('dashboard')">
                        <div class="w-8 h-8 bg-stone-800 dark:bg-orange-600 rounded-full flex items-center justify-center text-[#FDFCF8] font-serif font-bold text-lg">S</div>

                    <button onclick="app.navTo('quiz')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-xs font-semibold tracking-wide transition-colors uppercase">Quiz</button>
                    <button onclick="app.navTo('blurt')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-xs font-semibold tracking-wide transition-colors uppercase">Blurt</button>
                    <button onclick="app.navTo('matrix')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-xs font-semibold tracking-wide transition-colors uppercase">Matrix</button>
                    <button onclick="app.navTo('rank')" class="nav-btn text-stone-500 dark:text-stone-400 hover:text-stone-900 dark:hover:text-white text-xs font-semibold tracking-wide transition-colors uppercase">Rank</button>

                <div class="md:hidden flex items-center">

                </div>

        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-[#FDFCF8] dark:bg-[#1c1917] border-b border-stone-200 dark:border-stone-800 px-4 pt-2 pb-6 space-y-1">
            <button onclick="app.navTo('dashboard')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Mission</button>
            <button onclick="app.navTo('explore')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Vault</button>
            <button onclick="app.navTo('decks')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Decks</button>
            <button onclick="app.navTo('quiz')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Quiz</button>
            <button onclick="app.navTo('blurt')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Blurt</button>
            <button onclick="app.navTo('matrix')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Matrix</button>
            <button onclick="app.navTo('rank')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Rank</button>
            <button onclick="app.navTo('stats')" class="block w-full text-left px-4 py-3 rounded-xl text-stone-600 dark:text-stone-400 font-bold uppercase text-xs tracking-widest">Stats</button>
        </div>
    </nav>
    <div class="bg-[#FDFCF8] dark:bg-[#1c1917] border-b border-stone-200 dark:border-stone-700 transition-colors">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-1.5">
            <a href="https://www.paypal.com/donate/?hosted_button_id=YNP4RJ24MDV4C" target="_blank" rel="noopener noreferrer" class="text-sm font-semibold text-orange-600 dark:text-orange-400 hover:text-orange-700 dark:hover:text-orange-300 transition-colors underline underline-offset-2">My app is FREE to play, but please donate today!</a>
        </div>
    </div>

    <main id="app-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 pb-24"></main>

    <div id="modal-overlay" class="fixed inset-0 bg-stone-900/80 backdrop-blur-md hidden z-[60] opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div id="modal-content" class="bg-white dark:bg-[#1c1917] w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-[2.5rem] shadow-2xl transform scale-95 transition-transform duration-300 border border-stone-200 dark:border-stone-800"></div>
    </div>

    <div id="notification-box" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-stone-900 text-white px-6 py-4 rounded-2xl shadow-2xl z-[100] hidden flex items-center gap-4">
        <span id="notification-msg" class="font-medium">Session Complete!</span>
        <button onclick="app.hideNotification()" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-lg text-xs font-bold uppercase">Close</button>
    </div>

    <script>
        function esc(str) {
            const d = document.createElement('div');
            d.appendChild(document.createTextNode(str || ''));
            return d.innerHTML;
        }

        const AI_MODEL = "gemini-2.0-flash";

        const aiService = {
            async callGemini(userQuery, systemPrompt = "") {
                const payload = { model: AI_MODEL, contents: [{ parts: [{ text: userQuery }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
                try {
                    const response = await fetch('/api/gemini', { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                    if (!response.ok) {
                        const err = await response.json().catch(() => ({}));
                        return err.error || "API error occurred.";
                    }
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    return "Failed to contact the AI Mission Core.";
                }
            }
        };

        const learningData = [
            { id: 1, title: "Active Recall", category: "Memorization", efficiency: 95, effort: 85, summary: "Testing before review.", description: "The practice of retrieving information from memory without cues.", example: "Close the book and draw the system from memory.", steps: ["Scan material", "Hide source", "Recall and record"] },
            { id: 2, title: "Spaced Repetition", category: "Retention", efficiency: 92, effort: 40, summary: "Interval optimization.", description: "Reviewing information at increasing intervals to exploit the spacing effect.", example: "Review after 1 day, then 3 days, then 1 week.", steps: ["1 Day Review", "3 Day Review", "1 Week Review"] },
            { id: 3, title: "Feynman Technique", category: "Understanding", efficiency: 88, effort: 90, summary: "Simplify to teach.", description: "Teaching a concept in simple terms to identify gaps.", example: "Explain 'Quantum Entanglement' to a 10-year-old.", steps: ["Pick topic", "Teach child", "Spot logic gaps"] },
            { id: 4, title: "Interleaving", category: "Application", efficiency: 85, effort: 75, summary: "Subject shuffling.", description: "Mixing different subjects or problem types in a single session.", example: "Alternate between tennis serves and volleys.", steps: ["Pick 3 topics", "Rotate 25 mins", "Compare logic"] },
            { id: 5, title: "The Leitner System", category: "Retention", efficiency: 94, effort: 65, summary: "Box-based flashcards.", description: "A structured method using flashcards where correct cards move to less-frequent boxes, incorrect cards return to Box 1.", example: "Box 1: Daily. Box 2: Every 3 days. Box 3: Weekly.", steps: ["Setup 5 Boxes", "Test Box 1", "Correct? Advance", "Wrong? Reset to 1"] },
            { id: 6, title: "Eisenhower Matrix", category: "Prioritisation", efficiency: 90, effort: 30, summary: "Priority sorting.", description: "A decision-making framework that sorts tasks into four quadrants based on urgency and importance, training you to spend more time on what matters.", example: "Test tomorrow = Q1 (Do). Flashcards for next week = Q2 (Plan). Group chat = Q3 (Minimise). Scrolling = Q4 (Limit).", steps: ["Brain dump all tasks", "Sort by urgency + importance", "Act on Q1, plan Q2", "Minimise Q3, limit Q4"] }
        ];

        const deckStore = {
            load() { try { state.fcDecks = JSON.parse(localStorage.getItem('synapse_decks') || '[]'); } catch(e) { state.fcDecks = []; } },
            save() { localStorage.setItem('synapse_decks', JSON.stringify(state.fcDecks)); },
            add(title) { const d = { id: Date.now().toString(), title, createdAt: Date.now() }; state.fcDecks.push(d); this.save(); return d; },
            remove(id) { state.fcDecks = state.fcDecks.filter(d => d.id !== id); cardStore.removeByDeck(id); this.save(); },
        };

        const cardStore = {
            load() { try { state.fcCards = JSON.parse(localStorage.getItem('synapse_cards') || '[]'); } catch(e) { state.fcCards = []; } },
            save() { localStorage.setItem('synapse_cards', JSON.stringify(state.fcCards)); },
            add(deckId, front, back) {
                const c = { id: Date.now().toString(), deckId, front, back, box: 1, nextReview: Date.now(), createdAt: Date.now() };
                state.fcCards.push(c); this.save(); return c;
            },
            remove(id) { state.fcCards = state.fcCards.filter(c => c.id !== id); this.save(); },
            removeByDeck(deckId) { state.fcCards = state.fcCards.filter(c => c.deckId !== deckId); this.save(); },
            getForDeck(deckId) { return state.fcCards.filter(c => c.deckId === deckId); },
            getDue(deckId) { const now = Date.now(); return this.getForDeck(deckId).filter(c => c.nextReview <= now); },
            promote(card) {
                const intervals = [0, 1, 3, 7, 14, 30];
                card.box = Math.min(card.box + 1, 5);
                card.nextReview = Date.now() + intervals[card.box] * 86400000;
                this.save();
            },
            demote(card) { card.box = 1; card.nextReview = Date.now(); this.save(); }
        };

        const pomodoroStore = {
            load() { try { state.pomodoroLog = JSON.parse(localStorage.getItem('synapse_pomodoro_log') || '[]'); } catch(e) { state.pomodoroLog = []; } },
            save() { localStorage.setItem('synapse_pomodoro_log', JSON.stringify(state.pomodoroLog)); },
            normalize(label) { return label.trim().replace(/\s+/g, ' ').toLowerCase(); },
            log(taskLabel) { state.pomodoroLog.push({ task: this.normalize(taskLabel), completedAt: Date.now(), duration: state.timerInitialSeconds }); this.save(); },
            consecutiveCount(taskLabel) {
                const key = this.normalize(taskLabel);
                if (!key) return 0;
                let count = 0;
                for (let i = state.pomodoroLog.length - 1; i >= 0; i--) {
                    if (state.pomodoroLog[i].task === key) count++;
                    else break;
                }
                return count;
            },
            clearStreak() { state.pomodoroLog.push({ task: '__breakdown__', completedAt: Date.now() }); this.save(); },
            totalFocusTime() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.duration).reduce((s, p) => s + p.duration, 0); },
            totalSessions() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__').length; },
            recentDays(n) {
                const now = Date.now();
                const days = [];
                for (let i = n - 1; i >= 0; i--) {
                    const dayStart = new Date(now - i * 86400000); dayStart.setHours(0,0,0,0);
                    const dayEnd = new Date(dayStart); dayEnd.setHours(23,59,59,999);
                    const count = state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.completedAt >= dayStart.getTime() && p.completedAt <= dayEnd.getTime()).length;
                    days.push({ label: dayStart.toLocaleDateString('en', { weekday: 'short' }), count });
                }
                return days;
            }
        };

        const blurtStore = {
            load() { try { state.blurtSessions = JSON.parse(localStorage.getItem('synapse_blurt') || '[]'); } catch(e) { state.blurtSessions = []; } },
            save() { localStorage.setItem('synapse_blurt', JSON.stringify(state.blurtSessions)); },
            add(title, source) { const s = { id: Date.now().toString(), title, source, recall: '', gaps: '', reviewCount: 0, createdAt: Date.now(), updatedAt: Date.now() }; state.blurtSessions.push(s); this.save(); return s; },
            update(id, data) { const s = state.blurtSessions.find(x => x.id === id); if (s) { Object.assign(s, data, { updatedAt: Date.now() }); this.save(); } },
            remove(id) { state.blurtSessions = state.blurtSessions.filter(s => s.id !== id); this.save(); },
            get(id) { return state.blurtSessions.find(s => s.id === id); }
        };

        const eisenhowerStore = {
            load() {
                try {
                    const d = JSON.parse(localStorage.getItem('synapse_eisenhower') || '{}');
                    state.eisenhowerTasks = d.tasks || [];
                    state.eisenhowerReflections = d.reflections || [];
                } catch(e) { state.eisenhowerTasks = []; state.eisenhowerReflections = []; }
            },
            save() {
                localStorage.setItem('synapse_eisenhower', JSON.stringify({
                    tasks: state.eisenhowerTasks,
                    reflections: state.eisenhowerReflections,
                }));
            },
            addTask(text) {
                const t = { id: Date.now().toString(), text, quadrant: 0, createdAt: Date.now() };
                state.eisenhowerTasks.push(t);
                this.save();
                return t;
            },
            moveTask(id, quadrant) {
                const t = state.eisenhowerTasks.find(x => x.id === id);
                if (t) { t.quadrant = quadrant; this.save(); }
            },
            removeTask(id) {
                state.eisenhowerTasks = state.eisenhowerTasks.filter(t => t.id !== id);
                this.save();
            },
            completeTask(id) {
                const t = state.eisenhowerTasks.find(x => x.id === id);
                if (t) { t.completed = true; t.completedAt = Date.now(); this.save(); }
            },
            getByQuadrant(q) { return state.eisenhowerTasks.filter(t => t.quadrant === q && !t.completed); },
            getUnsorted() { return state.eisenhowerTasks.filter(t => t.quadrant === 0 && !t.completed); },
            getCompleted() { return state.eisenhowerTasks.filter(t => t.completed); },
            addReflection(text) {
                state.eisenhowerReflections.push({ text, createdAt: Date.now() });
                this.save();
            },
            clearCompleted() {
                state.eisenhowerTasks = state.eisenhowerTasks.filter(t => !t.completed);
                this.save();
            },
        };

        const RANKS = ['Space Cadet', 'Second Officer', 'Flight Commander'];
        const RANK_REQUIREMENTS = {
            'Second Officer': {
                blurtsCompleted: 10,
                governorBreakdowns: 10,
                cardsAdvanced: 50,
                activeDays: 7,
                pomodorosCompleted: 15,
            },
            'Flight Commander': {
                blurtsCompleted: 30,
                governorBreakdowns: 30,
                cardsAdvanced: 150,
                activeDays: 21,
                pomodorosCompleted: 50,
            },
        };

        const rankEngine = {
            load() {
                try {
                    const d = JSON.parse(localStorage.getItem('synapse_rank') || '{}');
                    state.rank = d.rank || 'Space Cadet';
                    state.rankEvidence = d.rankEvidence || { blurtsCompleted: 0, governorBreakdowns: 0, cardsAdvanced: 0, activeDays: 0, pomodorosCompleted: 0, lastActiveDate: '' };
                } catch(e) { state.rank = 'Space Cadet'; state.rankEvidence = { blurtsCompleted: 0, governorBreakdowns: 0, cardsAdvanced: 0, activeDays: 0, pomodorosCompleted: 0, lastActiveDate: '' }; }
            },
            save() {
                localStorage.setItem('synapse_rank', JSON.stringify({ rank: state.rank, rankEvidence: state.rankEvidence }));
            },
            trackActiveDay() {
                const today = new Date().toDateString();
                if (state.rankEvidence.lastActiveDate !== today) {
                    state.rankEvidence.lastActiveDate = today;
                    state.rankEvidence.activeDays++;
                    this.save();
                    this.checkPromotion();
                }
            },
            recordPomodoro() {
                state.rankEvidence.pomodorosCompleted++;
                this.save();
                this.checkPromotion();
            },
            recordGovernorBreakdown() {
                state.rankEvidence.governorBreakdowns++;
                this.save();
                this.checkPromotion();
            },
            recordCardStudy() {
                state.rankEvidence.cardsAdvanced++;
                this.save();
                this.checkPromotion();
            },
            recordBlurt() {
                state.rankEvidence.blurtsCompleted++;
                this.save();
                this.checkPromotion();
            },
            checkPromotion() {
                const currentIdx = RANKS.indexOf(state.rank);
                if (currentIdx >= RANKS.length - 1) return;
                const nextRank = RANKS[currentIdx + 1];
                const reqs = RANK_REQUIREMENTS[nextRank];
                if (!reqs) return;
                const ev = state.rankEvidence;
                const met = ev.blurtsCompleted >= reqs.blurtsCompleted &&
                            ev.governorBreakdowns >= reqs.governorBreakdowns &&
                            ev.cardsAdvanced >= reqs.cardsAdvanced &&
                            ev.activeDays >= reqs.activeDays &&
                            ev.pomodorosCompleted >= reqs.pomodorosCompleted;
                if (met) {
                    state.rank = nextRank;
                    this.save();
                    this.updateNavRank();
                    app.showNotification(`Rank Promotion: You are now ${nextRank}!`);
                    this.checkPromotion();
                }
            },
            updateNavRank() {
                const el = document.getElementById('nav-rank');
                if (el) el.textContent = state.rank;
            },
            getNextRank() {
                const idx = RANKS.indexOf(state.rank);
                return idx < RANKS.length - 1 ? RANKS[idx + 1] : null;
            },
            getProgress() {
                const next = this.getNextRank();
                if (!next) return null;
                const reqs = RANK_REQUIREMENTS[next];
                const ev = state.rankEvidence;
                return {
                    nextRank: next,
                    requirements: [
                        { label: 'Blurt Sessions', current: ev.blurtsCompleted, required: reqs.blurtsCompleted },
                        { label: 'Governor Breakdowns', current: ev.governorBreakdowns, required: reqs.governorBreakdowns },
                        { label: 'Cards Studied', current: ev.cardsAdvanced, required: reqs.cardsAdvanced },
                        { label: 'Active Days', current: ev.activeDays, required: reqs.activeDays },
                        { label: 'Focus Sessions', current: ev.pomodorosCompleted, required: reqs.pomodorosCompleted },
                    ]
                };
            },
        };

        const state = {
            view: 'dashboard', search: '', aiOutput: '', isAiLoading: false, user: null, breakdown: '', progress: {},
            timerSeconds: 25 * 60, timerInitialSeconds: 25 * 60, timerIsRunning: false, timerMode: 'work', timerInterval: null,
            timerTaskLabel: '', governorBlocked: false, pomodoroLog: [],

                if (state.timerIsRunning) return;
                if (state.timerMode === 'work') {
                    const labelEl = document.getElementById('timer-task-label');
                    if (labelEl) state.timerTaskLabel = labelEl.value;
                    if (!state.timerTaskLabel.trim()) { app.showNotification('Enter what you are working on first.'); return; }
                    const streak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                    if (streak >= 4) { state.governorBlocked = true; app.render(); return; }
                }
                state.timerIsRunning = true;
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    app.updateTimerUI();
                    if (state.timerSeconds <= 0) {
                        app.pauseTimer();
                        if (state.timerMode === 'work' && state.timerTaskLabel) {
                            pomodoroStore.log(state.timerTaskLabel);
                            const newStreak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                            rankEngine.recordPomodoro();
                            app.showNotification(`Focus complete! Streak: ${newStreak}/4`);
                            if (newStreak >= 4) { state.governorBlocked = true; }
                        } else {
                            app.showNotification("Break over!");
                        }
                        app.render();
                    }
                }, 1000);
                app.updateTimerUI();
            },

            pauseTimer: () => { state.timerIsRunning = false; clearInterval(state.timerInterval); app.updateTimerUI(); },

            resetTimer: () => { app.pauseTimer(); state.timerSeconds = state.timerInitialSeconds; state.governorBlocked = false; app.render(); },

            switchTimerMode: (mode) => {
                app.pauseTimer();
                state.timerMode = mode;
                state.timerInitialSeconds = mode === 'work' ? 25 * 60 : 5 * 60;
                state.timerSeconds = state.timerInitialSeconds;
                state.governorBlocked = false;
                app.render();
            },

            updateTimerUI: () => {
                const display = document.getElementById('timer-display');
                const btn = document.getElementById('timer-toggle-btn');
                const progress = document.getElementById('timer-progress');
                if (!display || !btn || !progress) return;
                const m = Math.floor(state.timerSeconds / 60);
                const s = state.timerSeconds % 60;
                display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                btn.textContent = state.timerIsRunning ? 'Pause' : 'Start';
                const circumference = 2 * Math.PI * 45;
                const offset = circumference - (state.timerSeconds / state.timerInitialSeconds) * circumference;
                progress.style.strokeDasharray = `${circumference} ${circumference}`;
                progress.style.strokeDashoffset = offset;
            },

                const box = document.getElementById('notification-box');

                progressItems.forEach(item => { progressState[item.id] = item.checked; });
                const statusIndicator = document.getElementById('save-status');
                if (statusIndicator) statusIndicator.textContent = "Saving...";
                try {
                    const dataRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', state.user.uid, 'settings', 'user_data');
                    await window.fb.setDoc(dataRef, { notes: notesArea ? notesArea.innerHTML : "", progress: progressState, updatedAt: Date.now() });
                    if (statusIndicator) statusIndicator.textContent = "Synced";
                    state.progress = progressState;
                } catch (e) { if (statusIndicator) statusIndicator.textContent = "Sync Error"; }

                const localNotes = localStorage.getItem('cornellNotes');
                const notesArea = document.getElementById('notes-editable');
                if (notesArea && localNotes) notesArea.innerHTML = localNotes;

                try {
                    const dataRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', state.user.uid, 'settings', 'user_data');
                    const snap = await window.fb.getDoc(dataRef);
                    if (snap.exists()) {
                        const data = snap.data();
                        if (notesArea && data.notes) notesArea.innerHTML = data.notes;
                        if (data.progress) {
                            state.progress = data.progress;
                            Object.keys(data.progress).forEach(id => { const el = document.getElementById(id); if (el) el.checked = data.progress[id]; });
                        }

                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);

                a.click(); URL.revokeObjectURL(a.href);
                app.showNotification('Data exported successfully!');

                        if (data.cards) { state.fcCards = data.cards; cardStore.save(); }
                        if (data.blurtSessions) { state.blurtSessions = data.blurtSessions; blurtStore.save(); }
                        if (data.pomodoroLog) { state.pomodoroLog = data.pomodoroLog; pomodoroStore.save(); }
                        if (data.notes) localStorage.setItem('cornellNotes', data.notes);

            quizStart: async () => {
                const catEl = document.getElementById('quiz-category');
                const diffEl = document.getElementById('quiz-difficulty');
                state.quizCategory = catEl ? catEl.value : '';
                state.quizDifficulty = diffEl ? diffEl.value : 'medium';
                state.quizPhase = 'loading'; app.render();
                try {
                    let url = `https://opentdb.com/api.php?amount=10&type=multiple&difficulty=${state.quizDifficulty}`;
                    if (state.quizCategory) url += `&category=${state.quizCategory}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    if (!data.results || data.results.length === 0) { app.showNotification('No questions found. Try a different category.'); state.quizPhase = 'setup'; app.render(); return; }
                    state.quizQuestions = data.results.map(q => {
                        const answers = [...q.incorrect_answers, q.correct_answer].sort(() => Math.random() - 0.5);
                        return { question: q.question, correct: q.correct_answer, answers, category: q.category };
                    });
                    state.quizIndex = 0; state.quizScore = 0; state.quizStreak = 0; state.quizAnswered = false;
                    state.quizSelectedAnswer = null; state.quizSessionCorrect = 0; state.quizSessionTotal = 0;
                    state.quizPhase = 'playing'; state.quizTimer = 15;
                    app.render(); app.startQuizTimer();
                } catch(e) { app.showNotification('Failed to load questions. Check your connection.'); state.quizPhase = 'setup'; app.render(); }
            },
            startQuizTimer: () => {
                clearInterval(state.quizTimerInterval);
                state.quizTimer = 15; app.updateQuizTimerUI();
                state.quizTimerInterval = setInterval(() => {
                    state.quizTimer--;
                    app.updateQuizTimerUI();
                    if (state.quizTimer <= 0) { clearInterval(state.quizTimerInterval); if (!state.quizAnswered) app.quizAnswer(null); }
                }, 1000);
            },
            updateQuizTimerUI: () => {
                const el = document.getElementById('quiz-timer-text');
                const ring = document.getElementById('quiz-timer-ring');
                if (el) el.textContent = state.quizTimer;
                if (ring) { const c = 2 * Math.PI * 20; ring.style.strokeDasharray = `${c} ${c}`; ring.style.strokeDashoffset = c - (state.quizTimer / 15) * c; }
            },
            quizAnswer: (ansIdx) => {
                if (state.quizAnswered) return;
                state.quizAnswered = true;
                clearInterval(state.quizTimerInterval);
                const q = state.quizQuestions[state.quizIndex];
                const answer = ansIdx !== null ? q.answers[ansIdx] : null;
                const correct = answer === q.correct;
                state.quizSelectedAnswer = answer;
                state.quizSessionTotal++;
                if (correct) { state.quizStreak++; state.quizSessionCorrect++; } else { state.quizStreak = 0; }
                app.render();
            },
            quizNext: () => {
                state.quizIndex++;
                state.quizAnswered = false;
                state.quizSelectedAnswer = null;
                if (state.quizIndex >= state.quizQuestions.length) {
                    state.quizPhase = 'results';
                    app.render(); return;
                }
                state.quizTimer = 15;
                app.render(); app.startQuizTimer();
            },
            quizReset: () => { clearInterval(state.quizTimerInterval); state.quizPhase = 'setup'; state.quizQuestions = []; app.render(); },

                            <div class="flex gap-3">
                                <button onclick="document.getElementById('quiz-difficulty').value='easy'" class="flex-1 py-3 rounded-xl border-2 border-stone-200 dark:border-stone-700 text-sm font-bold uppercase tracking-widest hover:border-green-500 hover:text-green-600 transition-all">Easy</button>
                                <button onclick="document.getElementById('quiz-difficulty').value='medium'" class="flex-1 py-3 rounded-xl border-2 border-orange-500 text-orange-600 text-sm font-bold uppercase tracking-widest">Medium</button>
                                <button onclick="document.getElementById('quiz-difficulty').value='hard'" class="flex-1 py-3 rounded-xl border-2 border-stone-200 dark:border-stone-700 text-sm font-bold uppercase tracking-widest hover:border-red-500 hover:text-red-600 transition-all">Hard</button>
                            </div>
                            <input type="hidden" id="quiz-difficulty" value="medium">
                        </div>
                        <button onclick="app.quizStart()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-sm mt-4">Start Quiz</button>
                    </div>
                </div>`;
            },

            getRankHTML: () => {
                const rankIdx = RANKS.indexOf(state.rank);
                const rankIcons = {'Space Cadet': '\u{1F680}', 'Second Officer': '\u{2B50}', 'Flight Commander': '\u{1F451}'};
                const progress = rankEngine.getProgress();
                return `<div class="animate-fade-in max-w-3xl mx-auto space-y-8">
                    <div class="text-center mb-8">
                        <h1 class="text-5xl font-serif font-bold mb-4">Your Rank</h1>
                        <p class="text-stone-500 dark:text-stone-400 italic">Progression through evidence-based learning</p>
                    </div>
                    <div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm text-center">
                        <div class="text-6xl mb-4">${rankIcons[state.rank] || '\u{1F680}'}</div>
                        <h2 class="text-4xl font-serif font-bold text-orange-600 mb-2">${esc(state.rank)}</h2>
                        <p class="text-stone-500 text-sm">Rank ${rankIdx + 1} of ${RANKS.length}</p>
                        <div class="flex justify-center gap-4 mt-6">${RANKS.map((r, i) => {
                            const earned = i <= rankIdx;
                            return '<div class="flex flex-col items-center gap-1"><div class="w-10 h-10 rounded-full flex items-center justify-center text-lg ' + (earned ? 'bg-orange-600 text-white' : 'bg-stone-200 dark:bg-stone-700 text-stone-400') + '">' + (rankIcons[r] || '') + '</div><span class="text-[9px] font-bold uppercase tracking-widest ' + (earned ? 'text-orange-600' : 'text-stone-400') + '">' + r.split(' ').map(w => w[0]).join('') + '</span></div>';
                        }).join('<div class="flex items-center"><div class="w-8 h-0.5 ' + 'bg-stone-300 dark:bg-stone-600' + '"></div></div>')}</div>
                    </div>
                    ${progress ? '<div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-1">Promotion Requirements</h3>' +
                        '<p class="text-sm text-stone-500 mb-6">Complete all requirements to earn the rank of <strong class="text-orange-600">' + esc(progress.nextRank) + '</strong></p>' +
                        '<div class="space-y-4">' + progress.requirements.map(r => {
                            const pct = Math.min(100, (r.current / r.required) * 100);
                            const done = r.current >= r.required;
                            return '<div class="flex items-center gap-4"><div class="w-5 h-5 rounded-full flex items-center justify-center text-xs ' + (done ? 'bg-green-500 text-white' : 'bg-stone-200 dark:bg-stone-700 text-stone-400') + '">' + (done ? '\\u2713' : '') + '</div><div class="flex-grow"><div class="flex justify-between text-sm mb-1"><span class="font-semibold ' + (done ? 'text-green-600' : '') + '">' + r.label + '</span><span class="text-stone-400 font-bold">' + Math.min(r.current, r.required) + ' / ' + r.required + '</span></div><div class="w-full bg-stone-100 dark:bg-stone-800 rounded-full h-2 overflow-hidden"><div class="h-full rounded-full transition-all ' + (done ? 'bg-green-500' : 'bg-orange-600') + '" style="width:' + pct + '%"></div></div></div></div>';
                        }).join('') + '</div></div>' :
                        '<div class="bg-green-50 dark:bg-green-900/20 rounded-[2.5rem] p-10 border border-green-200 dark:border-green-800 text-center">' +
                        '<div class="text-4xl mb-4">\u{1F451}</div>' +
                        '<h3 class="text-2xl font-serif font-bold text-green-700 dark:text-green-400 mb-2">Maximum Rank Achieved</h3>' +
                        '<p class="text-stone-500">You have demonstrated mastery of evidence-based learning methods.</p>' +
                        '</div>'}
                    <div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm">
                        <h3 class="text-lg font-serif font-bold mb-4">Evidence Log</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                            <div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">${state.rankEvidence.pomodorosCompleted}</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Focus Sessions</div></div>
                            <div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">${state.rankEvidence.blurtsCompleted}</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Blurt Sessions</div></div>
                            <div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">${state.rankEvidence.governorBreakdowns}</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Breakdowns</div></div>
                            <div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">${state.rankEvidence.cardsAdvanced}</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Cards Studied</div></div>
                            <div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">${state.rankEvidence.activeDays}</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Active Days</div></div>
                        </div>
                    </div>
                </div>`;
            },

            showAbout: () => alert("Synapse OS v7.0 - Interactive Learning OS with Rank System")
        };

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
