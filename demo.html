            return text
                .replace(/^### (.+)$/gm, '<h4 class="text-base font-serif font-bold text-stone-800 dark:text-stone-100 mt-5 mb-2">$1</h4>')
                .replace(/^## (.+)$/gm, '<h3 class="text-lg font-serif font-bold text-orange-700 dark:text-orange-400 mb-3">$1</h3>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/^- (.+)$/gm, '<li class="ml-4 text-sm text-stone-700 dark:text-stone-300 leading-relaxed list-disc">$1</li>')
                .replace(/^(\d+)\. (.+)$/gm, '<li class="ml-4 text-sm text-stone-700 dark:text-stone-300 leading-relaxed list-decimal">$1. $2</li>')
                .replace(/\n\n/g, '<br><br>')
                .replace(/\n/g, '\n');
        }

            normalize(label) { return label.trim().replace(/\s+/g, ' ').toLowerCase(); },
            log(taskLabel) { state.pomodoroLog.push({ task: this.normalize(taskLabel), completedAt: Date.now(), duration: state.timerInitialSeconds }); this.save(); },
            consecutiveCount(taskLabel) {
                const key = this.normalize(taskLabel);
                if (!key) return 0;
                let count = 0;
                for (let i = state.pomodoroLog.length - 1; i >= 0; i--) {
                    if (state.pomodoroLog[i].task === key) count++;

                }
                return count;

            clearStreak() { state.pomodoroLog.push({ task: '__breakdown__', completedAt: Date.now() }); this.save(); },
            totalFocusTime() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__' && p.duration).reduce((s, p) => s + p.duration, 0); },
            totalSessions() { return state.pomodoroLog.filter(p => p.task !== '__breakdown__').length; },
            recentDays(n) {
                const now = Date.now();
                const days = [];
                for (let i = n - 1; i >= 0; i--) {
                    const dayStart = new Date(now - i * 86400000); dayStart.setHours(0,0,0,0);
                    const dayEnd = new Date(dayStart); dayEnd.setHours(23,59,59,999);

                    days.push({ label: dayStart.toLocaleDateString('en', { weekday: 'short' }), count });
                }
                return days;
            }
        };

            getStreak() {
                const log = state.rankEvidence.activeDateLog || [];
                if (log.length === 0) return 0;
                const sorted = [...log].sort().reverse();
                const today = new Date().toISOString().slice(0, 10);
                const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
                if (sorted[0] !== today && sorted[0] !== yesterday) return 0;
                let streak = 1;
                for (let i = 1; i < sorted.length; i++) {
                    const prev = new Date(sorted[i - 1]);
                    const curr = new Date(sorted[i]);
                    const diff = (prev - curr) / 86400000;
                    if (diff === 1) streak++;
                    else break;
                }
                return streak;
            },

                state.rankEvidence.pomodorosCompleted++;

            navTo: (tabId) => {
                state.view = tabId;

                    const map = { dashboard: 'Mission', explore: 'Vault', decks: 'Decks', matrix: 'Matrix', rank: 'Rank', stats: 'Stats' };
                    if (btn.textContent.trim().toUpperCase() === (map[tabId] || '').toUpperCase()) btn.classList.add('text-orange-600', 'font-bold');
                });
                const toolsViews = ['matrix'];
                const toolsBtn = document.querySelector('#tools-dropdown > button');

                    if (toolsViews.includes(tabId)) { toolsBtn.classList.add('text-orange-600','font-bold'); toolsBtn.classList.remove('text-stone-500','dark:text-stone-400'); }
                    else { toolsBtn.classList.remove('text-orange-600','font-bold'); toolsBtn.classList.add('text-stone-500','dark:text-stone-400'); }
                }

            startTimer: () => {
                if (state.timerIsRunning) return;
                if (state.timerMode === 'work') {
                    const labelEl = document.getElementById('timer-task-label');
                    if (labelEl) state.timerTaskLabel = labelEl.value;
                    if (!state.timerTaskLabel.trim()) { app.showNotification('Enter what you are working on first.'); return; }
                    const streak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                    if (streak >= 4) { state.governorBlocked = true; app.render(); return; }
                }
                state.timerIsRunning = true;
                state.timerInterval = setInterval(() => {
                    state.timerSeconds--;
                    app.updateTimerUI();
                    if (state.timerSeconds <= 0) {
                        app.pauseTimer();
                        if (state.timerMode === 'work' && state.timerTaskLabel) {
                            pomodoroStore.log(state.timerTaskLabel);
                            const newStreak = pomodoroStore.consecutiveCount(state.timerTaskLabel);
                            rankEngine.recordPomodoro();
                            app.showNotification('Focus complete! Streak: ' + newStreak + '/4');
                            if (newStreak >= 4) { state.governorBlocked = true; }
                        } else {
                            app.showNotification("Break over!");
                        }
                        app.render();
                    }
                }, 1000);
                app.updateTimerUI();
            },

            pauseTimer: () => { state.timerIsRunning = false; clearInterval(state.timerInterval); app.updateTimerUI(); },
            resetTimer: () => { app.pauseTimer(); state.timerSeconds = state.timerInitialSeconds; state.governorBlocked = false; app.render(); },
            switchTimerMode: (mode) => {
                app.pauseTimer();
                state.timerMode = mode;
                state.timerInitialSeconds = mode === 'work' ? 25 * 60 : 5 * 60;
                state.timerSeconds = state.timerInitialSeconds;
                state.governorBlocked = false;
                app.render();
            },

            updateTimerUI: () => {
                const display = document.getElementById('timer-display');
                const btn = document.getElementById('timer-toggle-btn');
                const progress = document.getElementById('timer-progress');
                if (!display || !btn || !progress) return;
                const m = Math.floor(state.timerSeconds / 60);
                const s = state.timerSeconds % 60;
                display.textContent = m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
                btn.textContent = state.timerIsRunning ? 'Pause' : 'Start';
                const circumference = 2 * Math.PI * 45;
                const offset = circumference - (state.timerSeconds / state.timerInitialSeconds) * circumference;
                progress.style.strokeDasharray = circumference + ' ' + circumference;
                progress.style.strokeDashoffset = offset;
            },

            showNotification: (msg) => {
                const box = document.getElementById('notification-box');
                const text = document.getElementById('notification-msg');
                if (text) text.textContent = msg;
                if (box) { box.classList.remove('hidden'); setTimeout(() => box.classList.add('hidden'), 4000); }
            },

                state.fcStudyIndex++;

                        '<div class="flex gap-4 flex-wrap">' + boxNames.map((name, i) => {

                            return '<div class="bg-white dark:bg-[#292524] px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-center min-w-[80px]"><div class="text-[10px] font-bold uppercase text-stone-400 tracking-widest">' + name + '</div><div class="font-serif font-bold text-xl ' + (count > 0 ? 'text-orange-600' : 'text-stone-300') + '">' + count + '</div></div>';
                        }).join('') + '</div>' +
                        '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800"><h3 class="text-sm font-bold uppercase text-stone-500 tracking-widest mb-4">Add Card</h3><div class="flex flex-col sm:flex-row gap-3"><input id="card-front-input" type="text" placeholder="Front (Question)" class="flex-1 bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500"><input id="card-back-input" type="text" placeholder="Back (Answer)" class="flex-1 bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500"><button onclick="app.cardAdd()" class="bg-stone-900 dark:bg-stone-100 text-white dark:text-stone-900 px-6 py-3 rounded-xl font-bold text-sm">Add</button></div></div>' +

                            cards.map(c => {
                                const now = Date.now();
                                const overdueDays = Math.max(0, Math.floor((now - c.nextReview) / 86400000));
                                const isOverdue = c.nextReview <= now;
                                const orbitStatus = c.box >= 5 ? { icon: '\u2728', label: 'Stable Orbit', color: 'text-green-500', bg: 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800' }
                                    : c.box >= 3 ? { icon: '\uD83D\uDFE2', label: 'Approaching Orbit', color: 'text-emerald-500', bg: 'bg-white dark:bg-[#292524] border-stone-100 dark:border-stone-800' }
                                    : isOverdue && overdueDays > 3 ? { icon: '\uD83D\uDD34', label: 'Drifting', color: 'text-red-500', bg: 'bg-red-50 dark:bg-red-900/10 border-red-200 dark:border-red-800' }

                return '<div class="animate-fade-in max-w-4xl mx-auto space-y-8">' +
                    '<div class="text-center mb-8"><h1 class="text-5xl font-serif font-bold mb-4">Flashcard Decks</h1><p class="text-stone-500 dark:text-stone-400 italic">Leitner System: 5-box spaced repetition</p></div>' +
                    '<div class="bg-orange-50 dark:bg-orange-900/20 rounded-[2rem] p-6 border border-orange-200 dark:border-orange-800"><h3 class="text-base font-serif font-bold text-orange-700 dark:text-orange-400 mb-3">\uD83D\uDCCB How to use this</h3><div class="grid grid-cols-1 sm:grid-cols-3 gap-3"><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">1\uFE0F\u20E3</div><p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Create a new deck about a topic.</p></div><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">2\uFE0F\u20E3</div><p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Click your deck and add cards (question + answer).</p></div><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">3\uFE0F\u20E3</div><p class="text-xs font-semibold text-stone-700 dark:text-stone-200">Hit "Study" to quiz yourself. Right = move up, wrong = Box 1.</p></div></div></div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800"><div class="flex gap-3"><input id="new-deck-title" type="text" placeholder="e.g. Spanish Vocab, History Dates..." class="flex-grow bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" onkeydown="if(event.key===\'Enter\')app.deckCreate()"><button onclick="app.deckCreate()" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Create Deck</button></div></div>' +
                    '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">' + (state.fcDecks.length === 0 ? '<p class="text-stone-400 text-center py-8 col-span-full">No decks yet. Create one above.</p>' :
                        state.fcDecks.map(d => {

                            return '<div class="card-hover bg-white dark:bg-[#292524] p-6 rounded-2xl border border-stone-100 dark:border-stone-800 cursor-pointer flex flex-col transition-all" onclick="app.deckOpen(\'' + d.id + '\')">' +
                                '<h3 class="text-xl font-serif font-bold mb-2">' + esc(d.title) + '</h3>' +
                                '<p class="text-sm text-stone-500">' + cards.length + ' cards &middot; ' + due + ' due</p>' +
                                (cards.length > 0 ? '<div class="flex items-center gap-2 mt-2 mb-1"><div class="flex-grow bg-stone-100 dark:bg-stone-800 rounded-full h-1.5 overflow-hidden"><div class="h-full rounded-full bg-green-500 transition-all" style="width:' + orbitPct + '%"></div></div><span class="text-[9px] font-bold ' + (orbitPct >= 80 ? 'text-green-500' : orbitPct > 0 ? 'text-orange-500' : 'text-stone-400') + '">' + orbitPct + '% stable</span></div>' : '') +
                                '<div class="flex justify-between items-center mt-auto pt-3">' + (due > 0 ? '<button onclick="event.stopPropagation(); app.studyStart(\'' + d.id + '\')" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase">Study</button>' : '<span class="text-xs text-stone-400 uppercase font-bold">All caught up</span>') + '<button onclick="event.stopPropagation(); app.deckDelete(\'' + d.id + '\')" class="text-stone-400 hover:text-red-500 text-sm">&times;</button></div></div>';
                        }).join('')) +
                    '</div></div>';
            },

            getStudyHTML: () => {
                if (state.fcStudyIndex >= state.fcStudyQueue.length) return '<div class="text-center py-20"><h1 class="text-4xl font-serif font-bold mb-4">Session Complete!</h1><button onclick="app.navTo(\'decks\')" class="bg-orange-600 text-white px-8 py-3 rounded-2xl font-bold">Back to Decks</button></div>';
                const card = state.fcStudyQueue[state.fcStudyIndex];

                            '<div class="backface-hidden absolute inset-0 bg-white dark:bg-[#292524] rounded-[2rem] border border-stone-100 dark:border-stone-800 flex items-center justify-center p-8 shadow-sm"><p class="text-2xl font-serif font-bold text-center">' + esc(card.front) + '</p></div>' +
                            '<div class="backface-hidden rotate-y-180 absolute inset-0 bg-orange-50 dark:bg-orange-900/20 rounded-[2rem] border border-orange-200 dark:border-orange-800 flex items-center justify-center p-8 shadow-sm"><p class="text-2xl font-serif font-bold text-center text-orange-700 dark:text-orange-300">' + esc(card.back) + '</p></div>' +

                '</div>';
            },

                const unsorted = eisenhowerStore.getUnsorted();
                const q1 = eisenhowerStore.getByQuadrant(1);

                const q4 = eisenhowerStore.getByQuadrant(4);

                const taskCard = (t) => {
                    return '<div class="bg-white dark:bg-[#292524] p-3 rounded-xl border border-stone-100 dark:border-stone-800 flex flex-col gap-1">' +

                            (t.quadrant !== 1 ? '<button onclick="app.matrixMove(\'' + t.id + '\', 1)" class="text-[9px] font-bold uppercase tracking-widest bg-red-100 dark:bg-red-900/30 text-red-600 px-2 py-0.5 rounded">Q1</button>' : '') +
                            (t.quadrant !== 2 ? '<button onclick="app.matrixMove(\'' + t.id + '\', 2)" class="text-[9px] font-bold uppercase tracking-widest bg-amber-100 dark:bg-amber-900/30 text-amber-600 px-2 py-0.5 rounded">Q2</button>' : '') +
                            (t.quadrant !== 3 ? '<button onclick="app.matrixMove(\'' + t.id + '\', 3)" class="text-[9px] font-bold uppercase tracking-widest bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-2 py-0.5 rounded">Q3</button>' : '') +
                            (t.quadrant !== 4 ? '<button onclick="app.matrixMove(\'' + t.id + '\', 4)" class="text-[9px] font-bold uppercase tracking-widest bg-stone-200 dark:bg-stone-700 text-stone-500 px-2 py-0.5 rounded">Q4</button>' : '') +
                        '</div></div>';
                };

                const quadrantBlock = (num, title, subtitle, colorBg, colorBorder, colorText, items) =>
                    '<div class="rounded-[1.5rem] p-5 border ' + colorBorder + ' ' + colorBg + ' flex flex-col"><div class="mb-3"><h3 class="text-sm font-bold uppercase tracking-widest ' + colorText + '">' + title + '</h3><p class="text-[10px] text-stone-500 dark:text-stone-400 mt-0.5">' + subtitle + '</p></div><div class="space-y-2 flex-grow">' + (items.length === 0 ? '<p class="text-xs text-stone-400 italic">No tasks here</p>' : items.map(t => taskCard(t)).join('')) + '</div></div>';

                return '<div class="animate-fade-in max-w-5xl mx-auto space-y-8">' +

                    '<div class="bg-orange-50 dark:bg-orange-900/20 rounded-[2rem] p-6 border border-orange-200 dark:border-orange-800"><h3 class="text-base font-serif font-bold text-orange-700 dark:text-orange-400 mb-3">\uD83D\uDCCB How to use the Eisenhower Matrix</h3><div class="grid grid-cols-1 sm:grid-cols-3 gap-3"><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">1\uFE0F\u20E3</div><p class="text-sm font-bold text-stone-800 dark:text-stone-100">Brain dump</p><p class="text-xs text-stone-500 dark:text-stone-400 mt-1">Write everything on your mind.</p></div><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">2\uFE0F\u20E3</div><p class="text-sm font-bold text-stone-800 dark:text-stone-100">Sort into quadrants</p><p class="text-xs text-stone-500 dark:text-stone-400 mt-1">Move each task to Q1-Q4.</p></div><div class="bg-white dark:bg-stone-800 rounded-xl p-4 border border-orange-100 dark:border-stone-700 text-center"><div class="text-2xl mb-1">3\uFE0F\u20E3</div><p class="text-sm font-bold text-stone-800 dark:text-stone-100">Focus on Q2</p><p class="text-xs text-stone-500 dark:text-stone-400 mt-1">Important-but-not-urgent = real growth.</p></div></div></div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm"><h3 class="text-sm font-bold uppercase text-stone-500 tracking-widest mb-3">Brain Dump</h3><p class="text-xs text-stone-400 mb-4">Write everything on your mind. Don\'t organise yet.</p><div class="flex gap-3"><input id="matrix-task-input" type="text" placeholder="What\'s on your mind?" class="flex-grow bg-stone-50 dark:bg-stone-800 px-4 py-3 rounded-xl border border-stone-200 dark:border-stone-700 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" onkeydown="if(event.key===\'Enter\')app.matrixAddTask()"><button onclick="app.matrixAddTask()" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-xl font-bold text-sm uppercase tracking-widest">Add</button></div>' +
                    (unsorted.length > 0 ? '<div class="mt-4 space-y-2"><h4 class="text-xs font-bold uppercase text-stone-400 tracking-widest">Unsorted (' + unsorted.length + ')</h4>' + unsorted.map(t => '<div class="bg-stone-50 dark:bg-stone-800 p-3 rounded-xl flex items-center gap-3"><span class="text-sm font-medium flex-grow">' + esc(t.text) + '</span><div class="flex gap-1"><button onclick="app.matrixMove(\'' + t.id + '\', 1)" class="text-[9px] font-bold uppercase tracking-widest bg-red-100 dark:bg-red-900/30 text-red-600 px-2 py-1 rounded-lg">Q1</button><button onclick="app.matrixMove(\'' + t.id + '\', 2)" class="text-[9px] font-bold uppercase tracking-widest bg-amber-100 dark:bg-amber-900/30 text-amber-600 px-2 py-1 rounded-lg">Q2</button><button onclick="app.matrixMove(\'' + t.id + '\', 3)" class="text-[9px] font-bold uppercase tracking-widest bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-2 py-1 rounded-lg">Q3</button><button onclick="app.matrixMove(\'' + t.id + '\', 4)" class="text-[9px] font-bold uppercase tracking-widest bg-stone-300 dark:bg-stone-600 text-stone-600 dark:text-stone-300 px-2 py-1 rounded-lg">Q4</button></div><button onclick="app.matrixDelete(\'' + t.id + '\')" class="text-stone-400 hover:text-red-500 text-sm">&times;</button></div>').join('') + '</div>' : '') + '</div>' +

                    (completed.length > 0 ? '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800 shadow-sm"><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-serif font-bold">Completed (' + completed.length + ')</h3><button onclick="app.matrixClearCompleted()" class="text-xs font-bold uppercase tracking-widest text-stone-400 hover:text-red-500">Clear All</button></div><div class="space-y-2">' + completed.slice(-5).reverse().map(t => '<div class="flex items-center gap-3 text-stone-400 line-through text-sm"><span>' + esc(t.text) + '</span></div>').join('') + '</div></div>' : '') +
                '</div>';
            },

            getRankHTML: () => {
                const rankIdx = RANKS.indexOf(state.rank);
                const rankIcons = {'Space Cadet': '\uD83D\uDE80', 'Second Officer': '\u2B50', 'Flight Commander': '\uD83D\uDC51'};

                return '<div class="animate-fade-in max-w-3xl mx-auto space-y-8">' +
                    '<div class="text-center mb-8"><h1 class="text-5xl font-serif font-bold mb-4">Your Rank</h1><p class="text-stone-500 dark:text-stone-400 italic">Progression through evidence-based learning</p></div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm text-center">' +

                        '<h2 class="text-4xl font-serif font-bold text-orange-600 mb-2">' + esc(state.rank) + '</h2>' +
                        '<p class="text-stone-500 text-sm">Rank ' + (rankIdx + 1) + ' of ' + RANKS.length + '</p>' +
                        '<div class="flex justify-center gap-4 mt-6">' + RANKS.map((r, i) => {
                            const earned = i <= rankIdx;
                            return '<div class="flex flex-col items-center gap-1"><div class="w-10 h-10 rounded-full flex items-center justify-center text-lg ' + (earned ? 'bg-orange-600 text-white' : 'bg-stone-200 dark:bg-stone-700 text-stone-400') + '">' + (rankIcons[r] || '') + '</div><span class="text-[9px] font-bold uppercase tracking-widest ' + (earned ? 'text-orange-600' : 'text-stone-400') + '">' + r.split(' ').map(w => w[0]).join('') + '</span></div>';
                        }).join('<div class="flex items-center"><div class="w-8 h-0.5 bg-stone-300 dark:bg-stone-600"></div></div>') +
                    '</div></div>' +
                    (progress ? '<div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-1">Promotion Requirements</h3>' +
                        '<p class="text-sm text-stone-500 mb-6">Complete all requirements to earn <strong class="text-orange-600">' + esc(progress.nextRank) + '</strong></p>' +
                        '<div class="space-y-4">' + progress.requirements.map(r => {
                            const pct = Math.min(100, (r.current / r.required) * 100);
                            const done = r.current >= r.required;
                            return '<div class="flex items-center gap-4"><div class="w-5 h-5 rounded-full flex items-center justify-center text-xs ' + (done ? 'bg-green-500 text-white' : 'bg-stone-200 dark:bg-stone-700 text-stone-400') + '">' + (done ? '\u2713' : '') + '</div><div class="flex-grow"><div class="flex justify-between text-sm mb-1"><span class="font-semibold ' + (done ? 'text-green-600' : '') + '">' + r.label + '</span><span class="text-stone-400 font-bold">' + Math.min(r.current, r.required) + ' / ' + r.required + '</span></div><div class="w-full bg-stone-100 dark:bg-stone-800 rounded-full h-2 overflow-hidden"><div class="h-full rounded-full transition-all ' + (done ? 'bg-green-500' : 'bg-orange-600') + '" style="width:' + pct + '%"></div></div></div></div>';
                        }).join('') + '</div></div>' :
                        '<div class="bg-green-50 dark:bg-green-900/20 rounded-[2.5rem] p-10 border border-green-200 dark:border-green-800 text-center"><div class="text-4xl mb-4">\uD83D\uDC51</div><h3 class="text-2xl font-serif font-bold text-green-700 dark:text-green-400 mb-2">Maximum Rank Achieved</h3><p class="text-stone-500">You have demonstrated mastery of evidence-based learning methods.</p></div>') +
                    '<div class="bg-stone-100 dark:bg-stone-800/50 rounded-[2.5rem] p-10 border border-stone-200 dark:border-stone-700 relative overflow-hidden">' +
                        '<div class="absolute inset-0 bg-stone-200/50 dark:bg-stone-900/50 backdrop-blur-sm rounded-[2.5rem] flex flex-col items-center justify-center z-10">' +
                            '<div class="text-4xl mb-3">\uD83D\uDD12</div>' +
                            '<h3 class="text-xl font-serif font-bold text-stone-700 dark:text-stone-200 mb-2">Diagnostics Journey</h3>' +
                            '<p class="text-sm text-stone-500 dark:text-stone-400 mb-4 max-w-xs text-center">Complete 5 diagnostic missions to test your knowledge. Available in the full version.</p>' +
                            '<a href="' + GUMROAD_URL + '" target="_blank" rel="noopener noreferrer" class="bg-orange-600 hover:bg-orange-500 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest transition-colors">Unlock Full Version</a>' +
                        '</div>' +
                        '<div class="opacity-30 pointer-events-none"><h3 class="text-lg font-serif font-bold mb-3">\uD83D\uDEF0\uFE0F Diagnostics Journey</h3><div class="grid grid-cols-5 gap-2">' + [1,2,3,4,5].map(i => '<div class="text-center p-3 rounded-xl border bg-stone-50 dark:bg-stone-800 border-stone-200 dark:border-stone-700"><div class="text-lg">\u26AA</div><div class="text-[9px] font-bold uppercase tracking-widest mt-1 text-stone-400">M' + i + '</div></div>').join('') + '</div></div>' +
                    '</div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2.5rem] p-10 border border-stone-100 dark:border-stone-800 shadow-sm">' +
                        '<h3 class="text-lg font-serif font-bold mb-4">Evidence Log</h3>' +
                        '<div class="grid grid-cols-2 sm:grid-cols-4 gap-4">' +
                            '<div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">' + state.rankEvidence.pomodorosCompleted + '</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Focus Sessions</div></div>' +
                            '<div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">' + state.rankEvidence.governorBreakdowns + '</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Breakdowns</div></div>' +
                            '<div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">' + state.rankEvidence.cardsAdvanced + '</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Cards Studied</div></div>' +
                            '<div class="text-center p-4 bg-stone-50 dark:bg-stone-800 rounded-2xl"><div class="text-2xl font-serif font-bold text-orange-600">' + state.rankEvidence.activeDays + '</div><div class="text-[10px] font-bold uppercase tracking-widest text-stone-400 mt-1">Active Days</div></div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            },

            getStatsHTML: () => {
                const totalTime = pomodoroStore.totalFocusTime();
                const totalSessions = pomodoroStore.totalSessions();
                const hours = Math.floor(totalTime / 3600);
                const mins = Math.floor((totalTime % 3600) / 60);
                const taskCounts = {};
                state.pomodoroLog.filter(p => p.task !== '__breakdown__').forEach(p => { taskCounts[p.task] = (taskCounts[p.task] || 0) + 1; });
                const topTasks = Object.entries(taskCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

                return '<div class="animate-fade-in max-w-4xl mx-auto space-y-8">' +
                    '<div class="text-center mb-8"><h1 class="text-5xl font-serif font-bold mb-4">Session Stats</h1><p class="text-stone-500 dark:text-stone-400 italic">Your learning journey at a glance</p></div>' +
                    '<div class="grid grid-cols-1 sm:grid-cols-3 gap-6">' +
                        '<div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center"><div class="text-4xl font-serif font-bold text-orange-600">' + totalSessions + '</div><div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Focus Sessions</div></div>' +
                        '<div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center"><div class="text-4xl font-serif font-bold text-orange-600">' + hours + 'h ' + mins + 'm</div><div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Total Focus Time</div></div>' +
                        '<div class="bg-white dark:bg-[#292524] p-8 rounded-[2rem] border border-stone-100 dark:border-stone-800 text-center"><div class="text-4xl font-serif font-bold text-orange-600">' + state.fcDecks.length + '</div><div class="text-xs font-bold uppercase tracking-widest text-stone-400 mt-2">Flashcard Decks</div></div>' +
                    '</div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800"><h3 class="text-lg font-serif font-bold mb-4">Weekly Activity</h3><div class="chart-container"><canvas id="weeklyChart"></canvas></div></div>' +
                    '<div class="bg-white dark:bg-[#292524] rounded-[2rem] p-8 border border-stone-100 dark:border-stone-800">' +
                        '<h3 class="text-lg font-serif font-bold mb-4">Top Tasks</h3>' +
                        (topTasks.length === 0 ? '<p class="text-stone-400 text-sm">Complete some focus sessions to see your top tasks.</p>' :
                        '<div class="space-y-3">' + topTasks.map(([task, count]) => '<div class="flex items-center gap-3"><div class="flex-grow bg-stone-100 dark:bg-stone-800 rounded-full h-3 overflow-hidden"><div class="bg-orange-600 h-full rounded-full" style="width: ' + (count / topTasks[0][1]) * 100 + '%"></div></div><span class="text-sm font-medium w-20 text-right">' + esc(task) + '</span><span class="text-xs text-stone-400 font-bold w-8">' + count + '</span></div>').join('') + '</div>') +
                    '</div>' +
                '</div>';
            },

            renderCharts: () => {
                if (app.charts.scatter) app.charts.scatter.destroy();
                if (app.charts.doughnut) app.charts.doughnut.destroy();
                const isDark = document.body.classList.contains('dark');
                const gridColor = isDark ? '#44403c' : '#e7e5e4';
                const textColor = isDark ? '#a8a29e' : '#78716c';

                const scatterCanvas = document.getElementById('efficiencyChart');
                if (scatterCanvas) {
                    app.charts.scatter = new Chart(scatterCanvas, {
                        type: 'scatter',
                        data: { datasets: [{ label: 'Techniques', data: learningData.map(t => ({ x: t.effort, y: t.efficiency, label: t.title })), backgroundColor: '#ea580c', borderColor: '#ea580c', pointRadius: 8, pointHoverRadius: 12 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ctx.raw.label + ': Effort ' + ctx.raw.x + ', Efficiency ' + ctx.raw.y } } }, scales: { x: { title: { display: true, text: 'Effort', color: textColor }, grid: { color: gridColor }, ticks: { color: textColor } }, y: { title: { display: true, text: 'Efficiency', color: textColor }, grid: { color: gridColor }, ticks: { color: textColor } } } }
                    });
                }
                const doughnutCanvas = document.getElementById('distributionChart');
                if (doughnutCanvas) {
                    const categories = {};
                    learningData.forEach(t => { categories[t.category] = (categories[t.category] || 0) + 1; });
                    app.charts.doughnut = new Chart(doughnutCanvas, {
                        type: 'doughnut',
                        data: { labels: Object.keys(categories), datasets: [{ data: Object.values(categories), backgroundColor: ['#ea580c', '#78716c', '#d6d3d1', '#292524', '#f59e0b'] }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: textColor, font: { family: 'Inter' } } } } }
                    });
                }
            },

            renderStatsCharts: () => {
                if (app.charts.weekly) { app.charts.weekly.destroy(); app.charts.weekly = null; }
                const isDark = document.body.classList.contains('dark');
                const textColor = isDark ? '#a8a29e' : '#78716c';
                const gridColor = isDark ? '#44403c' : '#e7e5e4';
                const weeklyCanvas = document.getElementById('weeklyChart');
                if (weeklyCanvas) {
                    const days = pomodoroStore.recentDays(7);
                    app.charts.weekly = new Chart(weeklyCanvas, {
                        type: 'bar',
                        data: { labels: days.map(d => d.label), datasets: [{ label: 'Sessions', data: days.map(d => d.count), backgroundColor: '#ea580c', borderRadius: 8 }] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: textColor } }, y: { beginAtZero: true, ticks: { stepSize: 1, color: textColor }, grid: { color: gridColor } } } }
                    });
                }
            },
        };

        document.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
